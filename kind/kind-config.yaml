kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: feast-kfp-mlflow
nodes:
  - role: control-plane
    extraPortMappings:
      # MinIO API (S3)
      - containerPort: 30900
        hostPort: 9000
        protocol: TCP
      # MinIO Console
      - containerPort: 30901
        hostPort: 9001
        protocol: TCP
      # MLflow UI
      - containerPort: 30500
        hostPort: 5000
        protocol: TCP
      # Marquez Web UI
      - containerPort: 30300
        hostPort: 3000
        protocol: TCP
      # Inference API
      - containerPort: 30800
        hostPort: 8000
        protocol: TCP
      # Dataset Registry API
      - containerPort: 30880
        hostPort: 8080
        protocol: TCP
      # Dataset Registry UI
      - containerPort: 30881
        hostPort: 8081
        protocol: TCP
