# lineage-openshift-ai.yaml — single manifest for the practice-mlops stack on OpenShift / OpenShift AI.
#
# Includes: Namespace, secrets/configmaps, image BuildConfigs, data plane (MinIO, Postgres,
# Redis, Marquez, MLflow), Routes, DataSciencePipelinesApplication + secret, bootstrap Jobs,
# and the churn inference Deployment.
#
# Apply (after `oc login`):
#   oc apply -f openshift/lineage-openshift-ai.yaml
#
# Image builds (run from repo root; not part of apply):
#   oc project lineage
#   oc start-build fkm-app --from-dir=. --follow
#   oc start-build spark-etl --from-dir=. --follow
#
# Bootstrap Jobs + ordering: ./openshift/deploy.sh jobs   (or ./openshift/deploy.sh all)
# Helper to split this file: python3 openshift/lineage_manifest.py emit-infra | oc apply -f -
#
# OpenShift AI: ./openshift/deploy-dsp.sh  (DSPA from this file + workflow-controller OL env patch)
#
---
apiVersion: v1
kind: Namespace
metadata:
  name: lineage
  labels:
    app.kubernetes.io/part-of: feast-kfp-mlflow
---
apiVersion: v1
kind: Secret
metadata:
  name: fkm-credentials
  namespace: lineage
  labels:
    app.kubernetes.io/part-of: feast-kfp-mlflow
type: Opaque
stringData:
  # ── MinIO / S3 ──────────────────────────────────────────────────────
  MINIO_ACCESS_KEY: "minioadmin"
  MINIO_SECRET_KEY: "minioadmin123"
  AWS_ACCESS_KEY_ID: "minioadmin"
  AWS_SECRET_ACCESS_KEY: "minioadmin123"
  MINIO_ROOT_USER: "minioadmin"
  MINIO_ROOT_PASSWORD: "minioadmin123"
  # ── PostgreSQL ──────────────────────────────────────────────────────
  PG_USER: "feast"
  PG_PASSWORD: "feast"
  POSTGRES_USER: "feast"
  POSTGRES_PASSWORD: "feast"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fkm-config
  namespace: lineage
  labels:
    app.kubernetes.io/part-of: feast-kfp-mlflow
data:
  # ── MinIO / S3 ──────────────────────────────────────────────────────
  MINIO_ENDPOINT: "mlflow-minio:9000"
  MINIO_BUCKET: "raw-data"
  MINIO_SECURE: "false"
  MLFLOW_S3_ENDPOINT_URL: "http://mlflow-minio:9000"

  # ── PostgreSQL ──────────────────────────────────────────────────────
  PG_HOST: "postgres"
  PG_PORT: "5432"
  PG_DATABASE: "warehouse"
  POSTGRES_DB: "warehouse"

  # ── Redis ───────────────────────────────────────────────────────────
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"

  # ── MLflow ──────────────────────────────────────────────────────────
  MLFLOW_TRACKING_URI: "openlineage+http://mlflow-server:5000"
  MLFLOW_REGISTRY_URI: "http://mlflow-server:5000"
  MLFLOW_EXPERIMENT_NAME: "customer_churn_lineage"

  MLFLOW_ARTIFACT_URI: "s3://mlflow/artifacts"

  # ── OpenLineage ────────────────────────────────────────────────────
  OPENLINEAGE_URL: "http://marquez"
  OPENLINEAGE_NAMESPACE: "churn-demo/customer_churn"

  # ── Feast ───────────────────────────────────────────────────────────
  FEAST_REPO_PATH: "/app/src/feature_store"

  # ── App ─────────────────────────────────────────────────────────────
  MODEL_NAME: "customer_churn_model"
  RAW_CSV_OBJECT: "customers.csv"
  MODEL_ROC_AUC_THRESHOLD: "0.70"
  WAREHOUSE_TABLE: "customer_features"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: feast-config
  namespace: lineage
  labels:
    app.kubernetes.io/part-of: feast-kfp-mlflow
data:
  feature_store.yaml: |
    project: customer_churn
    provider: local
    registry:
      registry_type: sql
      path: postgresql://feast:feast@postgres:5432/warehouse
      cache_ttl_seconds: 60

    offline_store:
      type: postgres
      host: postgres
      port: 5432
      database: warehouse
      db_schema: public
      user: feast
      password: feast

    online_store:
      type: redis
      connection_string: redis:6379

    entity_key_serialization_version: 2

    openlineage:
      enabled: true
      transport_type: http
      transport_url: http://marquez
      namespace: churn-demo
      emit_on_apply: true
      emit_on_materialize: true
---
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: lineage
  labels:
    app.kubernetes.io/part-of: feast-kfp-mlflow
    app.kubernetes.io/component: postgres
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
---
# ImageStream for the unified app image (ETL + Feast + Pipeline + Serving)
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: fkm-app
  namespace: lineage
  labels:
    app.kubernetes.io/part-of: feast-kfp-mlflow

---
# BuildConfig – builds from the repo root using the unified Dockerfile
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: fkm-app
  namespace: lineage
  labels:
    app.kubernetes.io/part-of: feast-kfp-mlflow
spec:
  source:
    type: Binary
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: fkm-app:latest

---
# ImageStream for the Spark ETL image
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: spark-etl
  namespace: lineage
  labels:
    app.kubernetes.io/part-of: feast-kfp-mlflow

---
# BuildConfig – builds from the repo root using Dockerfile.spark
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: spark-etl
  namespace: lineage
  labels:
    app.kubernetes.io/part-of: feast-kfp-mlflow
spec:
  source:
    type: Binary
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile.spark
  output:
    to:
      kind: ImageStreamTag
      name: spark-etl:latest
  resources:
    limits:
      cpu: "2"
      memory: 4Gi
---
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-minio-pvc
  namespace: lineage
  labels:
    app: mlflow-minio
    app.kubernetes.io/part-of: feast-kfp-mlflow
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-minio
  namespace: lineage
  labels:
    app: mlflow-minio
    app.kubernetes.io/part-of: feast-kfp-mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow-minio
  template:
    metadata:
      labels:
        app: mlflow-minio
    spec:
      containers:
        - name: minio
          image: quay.io/minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: mlflow-minio-secret
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mlflow-minio-secret
                  key: MINIO_ROOT_PASSWORD
          volumeMounts:
            - name: minio-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: minio-data
          persistentVolumeClaim:
            claimName: mlflow-minio-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-minio
  namespace: lineage
  labels:
    app: mlflow-minio
    app.kubernetes.io/part-of: feast-kfp-mlflow
spec:
  selector:
    app: mlflow-minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: lineage
  labels:
    app: postgres
    app.kubernetes.io/part-of: feast-kfp-mlflow
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: quay.io/sclorg/postgresql-15-c9s:latest
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: fkm-credentials
                  key: PG_USER
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fkm-credentials
                  key: PG_PASSWORD
            - name: POSTGRESQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: fkm-config
                  key: PG_DATABASE
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgsql/data
          readinessProbe:
            exec:
              command:
                - bash
                - -c
                - pg_isready -h 127.0.0.1 -p 5432
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - bash
                - -c
                - pg_isready -h 127.0.0.1 -p 5432
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: lineage
  labels:
    app: postgres
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: lineage
  labels:
    app: redis
    app.kubernetes.io/part-of: feast-kfp-mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: quay.io/sclorg/redis-7-c9s:latest
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command:
                - bash
                - -c
                - redis-cli ping | grep -q PONG
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - bash
                - -c
                - redis-cli ping | grep -q PONG
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: lineage
  labels:
    app: redis
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
---
apiVersion: v1
