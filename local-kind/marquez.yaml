---
apiVersion: v1
kind: Secret
metadata:
  name: marquez-db-secret
  namespace: lineage
type: Opaque
stringData:
  POSTGRES_USER: marquez
  POSTGRES_PASSWORD: marquez123
  POSTGRES_DB: marquez

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: marquez-db
  namespace: lineage
  labels:
    app: marquez-db
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: marquez-db
  template:
    metadata:
      labels:
        app: marquez-db
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: marquez-db-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "marquez", "-d", "marquez"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "marquez", "-d", "marquez"]
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: data
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: marquez-db
  namespace: lineage
spec:
  selector:
    app: marquez-db
  ports:
    - port: 5432
      targetPort: 5432

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: marquez-config
  namespace: lineage
data:
  config.yml: |
    server:
      applicationConnectors:
      - type: http
        port: ${MARQUEZ_PORT}
        httpCompliance: RFC7230_LEGACY
      adminConnectors:
      - type: http
        port: ${MARQUEZ_ADMIN_PORT}
    db:
      driverClass: org.postgresql.Driver
      url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
    migrateOnStartup: true
    logging:
      level: INFO
      appenders:
        - type: console

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: marquez
  namespace: lineage
  labels:
    app: marquez
spec:
  replicas: 1
  selector:
    matchLabels:
      app: marquez
  template:
    metadata:
      labels:
        app: marquez
    spec:
      containers:
        - name: marquez
          image: marquezproject/marquez:0.51.1
          ports:
            - name: http
              containerPort: 5000
            - name: admin
              containerPort: 5001
          volumeMounts:
            - name: config
              mountPath: /usr/src/app/config.yml
              subPath: config.yml
          env:
            - name: MARQUEZ_PORT
              value: "5000"
            - name: MARQUEZ_ADMIN_PORT
              value: "5001"
            - name: MARQUEZ_CONFIG
              value: /usr/src/app/config.yml
            - name: POSTGRES_HOST
              value: marquez-db
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: marquez
            - name: POSTGRES_USER
              value: marquez
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: marquez-db-secret
                  key: POSTGRES_PASSWORD
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: admin
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: admin
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: marquez-config

---
apiVersion: v1
kind: Service
metadata:
  name: marquez
  namespace: lineage
spec:
  selector:
    app: marquez
  ports:
    - port: 80
      targetPort: 5000
      name: http

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: marquez-web
  namespace: lineage
  labels:
    app: marquez-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: marquez-web
  template:
    metadata:
      labels:
        app: marquez-web
    spec:
      containers:
        - name: marquez-web
          image: marquezproject/marquez-web:0.51.1
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: MARQUEZ_HOST
              value: marquez
            - name: MARQUEZ_PORT
              value: "80"
            - name: WEB_PORT
              value: "3000"
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: marquez-web
  namespace: lineage
spec:
  selector:
    app: marquez-web
  ports:
    - port: 80
      targetPort: 3000
      name: http
