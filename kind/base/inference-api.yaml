---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-api
  namespace: lineage
  labels:
    app: inference-api
    app.kubernetes.io/part-of: feast-kfp-mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inference-api
  template:
    metadata:
      labels:
        app: inference-api
    spec:
      enableServiceLinks: false
      initContainers:
        - name: wait-for-redis
          image: alpine:3
          command:
            - sh
            - -c
            - |
              echo "Waiting for redis:6379 ..."
              until nc -z redis 6379 2>/dev/null; do sleep 2; done
              echo "Redis is up"
        - name: wait-for-mlflow
          image: alpine:3
          command:
            - sh
            - -c
            - |
              echo "Waiting for mlflow-server:5000 ..."
              until nc -z mlflow-server 5000 2>/dev/null; do sleep 2; done
              echo "MLflow is up"
      containers:
        - name: inference-api
          # Local image built and loaded into Kind
          image: fkm-app:latest
          imagePullPolicy: Never
          command: ["uvicorn", "src.serving.app:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: fkm-config
            - secretRef:
                name: fkm-credentials
          volumeMounts:
            - name: feast-config
              mountPath: /app/src/feature_store/feature_store.yaml
              subPath: feature_store.yaml
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: feast-config
          configMap:
            name: feast-config

---
apiVersion: v1
kind: Service
metadata:
  name: inference-api
  namespace: lineage
  labels:
    app: inference-api
spec:
  selector:
    app: inference-api
  ports:
    - port: 8000
      targetPort: 8000

---
# NodePort for localhost access
apiVersion: v1
kind: Service
metadata:
  name: inference-api-nodeport
  namespace: lineage
  labels:
    app: inference-api
    app.kubernetes.io/part-of: feast-kfp-mlflow
spec:
  type: NodePort
  selector:
    app: inference-api
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30800
