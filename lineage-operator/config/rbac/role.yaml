apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lineage-operator-role
rules:
  # Watch Pods cluster-wide
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "update", "patch"]

  # Manage AgentCards cluster-wide
  - apiGroups: ["lineage.ai.platform"]
    resources: ["agentcards"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  - apiGroups: ["lineage.ai.platform"]
    resources: ["agentcards/status"]
    verbs: ["get", "update", "patch"]

  # Read ConfigMaps for configuration
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]

  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Create events for debugging
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
