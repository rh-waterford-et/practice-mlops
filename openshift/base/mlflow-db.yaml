---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-db-pvc
  namespace: lineage
  labels:
    app: mlflow-db
    app.kubernetes.io/part-of: feast-kfp-mlflow
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: Secret
metadata:
  name: mlflow-db-secret
  namespace: lineage
  labels:
    app: mlflow-db
    app.kubernetes.io/part-of: feast-kfp-mlflow
type: Opaque
stringData:
  POSTGRESQL_USER: "mlflow"
  POSTGRESQL_PASSWORD: "mlflow123"
  POSTGRESQL_DATABASE: "mlflow"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-db
  namespace: lineage
  labels:
    app: mlflow-db
    app.kubernetes.io/part-of: feast-kfp-mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow-db
  template:
    metadata:
      labels:
        app: mlflow-db
    spec:
      containers:
        - name: postgresql
          image: registry.redhat.io/rhel9/postgresql-15:latest
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: mlflow-db-secret
                  key: POSTGRESQL_USER
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mlflow-db-secret
                  key: POSTGRESQL_PASSWORD
            - name: POSTGRESQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mlflow-db-secret
                  key: POSTGRESQL_DATABASE
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/pgsql/data
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "pg_isready -U mlflow -d mlflow"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "pg_isready -U mlflow -d mlflow"]
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: mlflow-db-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-db
  namespace: lineage
  labels:
    app: mlflow-db
    app.kubernetes.io/part-of: feast-kfp-mlflow
spec:
  selector:
    app: mlflow-db
  ports:
    - port: 5432
      targetPort: 5432
