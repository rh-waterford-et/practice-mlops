---
# ImageStream for the unified app image (ETL + Feast + Pipeline + Serving)
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: fkm-app
  namespace: lineage
  labels:
    app.kubernetes.io/part-of: feast-kfp-mlflow

---
# BuildConfig – builds from the repo root using the unified Dockerfile
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: fkm-app
  namespace: lineage
  labels:
    app.kubernetes.io/part-of: feast-kfp-mlflow
spec:
  source:
    type: Binary
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: fkm-app:latest

---
# ImageStream for the Spark ETL image
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: spark-etl
  namespace: lineage
  labels:
    app.kubernetes.io/part-of: feast-kfp-mlflow

---
# BuildConfig – builds from the repo root using Dockerfile.spark
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: spark-etl
  namespace: lineage
  labels:
    app.kubernetes.io/part-of: feast-kfp-mlflow
spec:
  source:
    type: Binary
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile.spark
  output:
    to:
      kind: ImageStreamTag
      name: spark-etl:latest
  resources:
    limits:
      cpu: "2"
      memory: 4Gi
