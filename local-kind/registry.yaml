---
apiVersion: v1
kind: Secret
metadata:
  name: registry-db-secret
  namespace: lineage
type: Opaque
stringData:
  POSTGRES_USER: registry
  POSTGRES_PASSWORD: registry
  POSTGRES_DB: registry

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry-db
  namespace: lineage
  labels:
    app: registry-db
    app.kubernetes.io/part-of: dataset-registry
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: registry-db
  template:
    metadata:
      labels:
        app: registry-db
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: registry-db-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "registry", "-d", "registry"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "registry", "-d", "registry"]
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: data
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: registry-db
  namespace: lineage
  labels:
    app: registry-db
    app.kubernetes.io/part-of: dataset-registry
spec:
  selector:
    app: registry-db
  ports:
    - port: 5432
      targetPort: 5432

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dataset-registry-api
  namespace: lineage
  labels:
    app: dataset-registry-api
    app.kubernetes.io/part-of: dataset-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dataset-registry-api
  template:
    metadata:
      labels:
        app: dataset-registry-api
    spec:
      containers:
        - name: api
          image: dataset-registry-api:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              value: registry-db
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: registry
            - name: DB_PASSWORD
              value: registry
            - name: DB_NAME
              value: registry
            - name: MARQUEZ_URL
              value: "http://marquez:80"
            - name: S3_ENDPOINT
              value: "http://mlflow-minio:9000"
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: mlflow-minio-secret
                  key: MINIO_ROOT_USER
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: mlflow-minio-secret
                  key: MINIO_ROOT_PASSWORD
          readinessProbe:
            httpGet:
              path: /docs
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /docs
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: dataset-registry-api
  namespace: lineage
  labels:
    app: dataset-registry-api
    app.kubernetes.io/part-of: dataset-registry
spec:
  selector:
    app: dataset-registry-api
  ports:
    - port: 8080
      targetPort: 8080

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dataset-registry-ui
  namespace: lineage
  labels:
    app: dataset-registry-ui
    app.kubernetes.io/part-of: dataset-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dataset-registry-ui
  template:
    metadata:
      labels:
        app: dataset-registry-ui
    spec:
      containers:
        - name: ui
          image: dataset-registry-ui:local
          imagePullPolicy: Never
          env:
            - name: MARQUEZ_WEB_URL
              value: "http://localhost:3000"
          ports:
            - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: dataset-registry-ui
  namespace: lineage
  labels:
    app: dataset-registry-ui
    app.kubernetes.io/part-of: dataset-registry
spec:
  selector:
    app: dataset-registry-ui
  ports:
    - port: 8080
      targetPort: 8080
