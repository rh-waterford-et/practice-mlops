deploymentSpec:
  executors:
    exec-chunk-documents:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - chunk_documents
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef chunk_documents(\n    input_docs: dsl.Input[dsl.Dataset],\n \
          \   chunk_size: int,\n    chunk_overlap: int,\n    minio_endpoint: str,\n\
          \    openlineage_url: str,\n    output_chunks: dsl.Output[dsl.Dataset],\n\
          ) -> int:\n    \"\"\"Split documents into chunks with overlap.\"\"\"\n \
          \   import json\n    import gc\n    import os\n    from datetime import\
          \ datetime, timezone\n    from uuid import uuid4\n    from openlineage.client\
          \ import OpenLineageClient\n    from openlineage.client.run import RunEvent,\
          \ RunState, Run, Job, Dataset\n    from openlineage.client.facet import\
          \ SchemaDatasetFacet, SchemaField, OutputStatisticsOutputDatasetFacet\n\n\
          \    # Load documents\n    with open(input_docs.path) as f:\n        documents\
          \ = json.load(f)\n\n    print(f\"Loaded {len(documents)} documents\")\n\n\
          \    # Process one document at a time and write incrementally to save memory\n\
          \    chunks = []\n    chunk_id = 0\n    total_chars = 0\n\n    for idx,\
          \ doc in enumerate(documents):\n        content = doc[\"content\"]\n   \
          \     doc_chunks = []\n\n        # Simple character-based chunking\n   \
          \     start = 0\n        while start < len(content):\n            end =\
          \ min(start + chunk_size, len(content))\n            chunk_text = content[start:end]\n\
          \n            # Try to break at sentence boundaries if possible\n      \
          \      if end < len(content):\n                # Look for last period, newline,\
          \ or space\n                for delimiter in ['. ', '\\n\\n', '\\n', ' ']:\n\
          \                    last_delim = chunk_text.rfind(delimiter)\n        \
          \            if last_delim > chunk_size // 2:  # At least halfway through\n\
          \                        end = start + last_delim + len(delimiter)\n   \
          \                     chunk_text = content[start:end]\n                \
          \        break\n\n            chunk_stripped = chunk_text.strip()\n    \
          \        doc_chunks.append({\n                \"chunk_id\": chunk_id,\n\
          \                \"source\": doc[\"source\"],\n                \"filename\"\
          : doc[\"filename\"],\n                \"text\": chunk_stripped,\n      \
          \          \"start_char\": start,\n                \"end_char\": end,\n\
          \            })\n            total_chars += len(chunk_stripped)\n\n    \
          \        chunk_id += 1\n            start = max(end - chunk_overlap, start\
          \ + 1)\n\n        chunks.extend(doc_chunks)\n        print(f\"Processed\
          \ document {idx + 1}/{len(documents)}: {len(doc_chunks)} chunks\")\n\n \
          \       # Clear references to free memory\n        del doc_chunks\n    \
          \    del content\n        gc.collect()\n\n    # Save chunks\n    print(f\"\
          Writing {len(chunks)} total chunks to output\")\n    with open(output_chunks.path,\
          \ 'w') as f:\n        json.dump(chunks, f)\n\n    # Emit OpenLineage event\n\
          \    namespace = os.environ.get(\"OPENLINEAGE_NAMESPACE\", \"default\")\n\
          \    ol_client = OpenLineageClient(url=openlineage_url)\n    run_id = str(uuid4())\n\
          \n    input_dataset = Dataset(\n        namespace=f\"s3://{minio_endpoint}\"\
          ,\n        name=\"mlflow.artifacts.rag-ingestion.documents\",\n        facets={},\n\
          \    )\n\n    output_dataset = Dataset(\n        namespace=f\"s3://{minio_endpoint}\"\
          ,\n        name=\"mlflow.artifacts.rag-ingestion.chunks\",\n        facets={\n\
          \            \"schema\": SchemaDatasetFacet(\n                fields=[\n\
          \                    SchemaField(name=\"chunk_id\", type=\"INTEGER\"),\n\
          \                    SchemaField(name=\"source\", type=\"STRING\"),\n  \
          \                  SchemaField(name=\"filename\", type=\"STRING\"),\n  \
          \                  SchemaField(name=\"text\", type=\"TEXT\"),\n        \
          \            SchemaField(name=\"start_char\", type=\"INTEGER\"),\n     \
          \               SchemaField(name=\"end_char\", type=\"INTEGER\"),\n    \
          \            ]\n            ),\n            \"outputStatistics\": OutputStatisticsOutputDatasetFacet(\n\
          \                rowCount=len(chunks),\n                size=total_chars,\n\
          \            ),\n        },\n    )\n\n    event = RunEvent(\n        eventType=RunState.COMPLETE,\n\
          \        eventTime=datetime.now(timezone.utc).isoformat(),\n        run=Run(runId=run_id,\
          \ facets={}),\n        job=Job(namespace=namespace, name=\"rag_chunk_documents\"\
          , facets={}),\n        inputs=[input_dataset],\n        outputs=[output_dataset],\n\
          \        producer=\"rag-ingestion-pipeline/chunk\",\n    )\n    ol_client.emit(event)\n\
          \    print(f\"OpenLineage event emitted: {namespace}/rag_chunk_documents\"\
          )\n\n    del chunks\n    gc.collect()\n\n    print(f\"Created {chunk_id}\
          \ chunks from {len(documents)} documents\")\n    return chunk_id\n\n"
        env:
        - name: OPENLINEAGE_PARENT_JOB_NAME
          value: full-ml-rag-pipeline
        image: image-registry.openshift-image-registry.svc:5000/lineage/fkm-app:latest
    exec-ds-data-extraction:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - ds_data_extraction
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef ds_data_extraction(\n    pg_url: str,\n    feast_repo_path: str,\n\
          \    table_name: str,\n    pg_host: str,\n    redis_host: str,\n    materialize_done:\
          \ str,\n    output_path: dsl.Output[dsl.Dataset],\n) -> None:\n    \"\"\"\
          Retrieve historical features from Feast and save as parquet.\"\"\"\n   \
          \ import os\n\n    import pandas as pd\n    from sqlalchemy import create_engine,\
          \ text\n    from feast import FeatureStore\n    from openlineage_oai.adapters.kfp\
          \ import kfp_lineage, kfp_output_with_schema\n\n    ol_namespace = os.environ.get(\"\
          OPENLINEAGE_NAMESPACE\", \"default\")\n    feast_project = ol_namespace.replace(\"\
          -\", \"_\")\n    fs_yaml = os.path.join(feast_repo_path, \"feature_store.yaml\"\
          )\n    with open(fs_yaml, \"w\") as f:\n        f.write(f\"\"\"\\\nproject:\
          \ {feast_project}\nprovider: local\nregistry:\n  registry_type: sql\n  path:\
          \ postgresql://feast:feast@{pg_host}:5432/warehouse\n  cache_ttl_seconds:\
          \ 60\noffline_store:\n  type: postgres\n  host: {pg_host}\n  port: 5432\n\
          \  database: warehouse\n  db_schema: public\n  user: feast\n  password:\
          \ feast\nonline_store:\n  type: redis\n  connection_string: {redis_host}:6379\n\
          entity_key_serialization_version: 2\nopenlineage:\n  enabled: true\n  transport_type:\
          \ http\n  transport_url: http://marquez\n  emit_on_apply: true\n  emit_on_materialize:\
          \ true\n\"\"\")\n    print(f\"Patched {fs_yaml} -> pg={pg_host}, redis={redis_host},\
          \ ol_ns={ol_namespace}\")\n\n    with kfp_lineage(\n        \"kfp-data_extraction\"\
          ,\n        inputs=[{\"namespace\": f\"postgres://{pg_host}:5432\", \"name\"\
          : \"warehouse.customer_features_view\"}],\n        outputs=[],\n       \
          \ url=\"http://marquez\",\n    ) as run:\n        engine = create_engine(pg_url)\n\
          \        with engine.connect() as conn:\n            entity_df = pd.read_sql(\n\
          \                text(f\"SELECT entity_id, event_timestamp, churn FROM {table_name}\"\
          ),\n                conn,\n            )\n        engine.dispose()\n   \
          \     entity_df[\"event_timestamp\"] = pd.to_datetime(\n            entity_df[\"\
          event_timestamp\"], utc=True,\n        )\n\n        store = FeatureStore(repo_path=feast_repo_path)\n\
          \        features = [\n            \"customer_features_view:tenure_months\"\
          ,\n            \"customer_features_view:monthly_charges\",\n           \
          \ \"customer_features_view:total_charges\",\n            \"customer_features_view:num_support_tickets\"\
          ,\n            \"customer_features_view:contract_type\",\n            \"\
          customer_features_view:internet_service\",\n            \"customer_features_view:payment_method\"\
          ,\n        ]\n        features_df = store.get_historical_features(\n   \
          \         entity_df=entity_df[[\"entity_id\", \"event_timestamp\"]],\n \
          \           features=features,\n        ).to_df()\n\n        for df_ in\
          \ (features_df, entity_df):\n            df_[\"event_timestamp\"] = pd.to_datetime(\n\
          \                df_[\"event_timestamp\"], utc=True,\n            )\n\n\
          \        result = features_df.merge(\n            entity_df[[\"entity_id\"\
          , \"event_timestamp\", \"churn\"]],\n            on=[\"entity_id\", \"event_timestamp\"\
          ],\n            how=\"left\",\n        )\n        print(f\"DS: data extraction\
          \ complete - shape {result.shape}\")\n        result.to_parquet(output_path.path)\n\
          \        run.add_output(kfp_output_with_schema(output_path, result))\n\n"
        env:
        - name: OPENLINEAGE_PARENT_JOB_NAME
          value: full-ml-rag-pipeline
        image: image-registry.openshift-image-registry.svc:5000/lineage/fkm-app:latest
    exec-ds-evaluation:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - ds_evaluation
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef ds_evaluation(train_result_json: str) -> str:\n    \"\"\"Display\
          \ and return evaluation metrics.\"\"\"\n    import json\n    import os\n\
          \    from openlineage_oai.adapters.kfp import kfp_lineage\n\n    ol_namespace\
          \ = os.environ.get(\"OPENLINEAGE_NAMESPACE\", \"default\")\n\n    with kfp_lineage(\n\
          \        \"kfp-evaluation\",\n        inputs=[{\"namespace\": ol_namespace,\
          \ \"name\": \"model.model\"}],\n        outputs=[],\n        url=\"http://marquez\"\
          ,\n    ):\n        result = json.loads(train_result_json)\n        m = result[\"\
          metrics\"]\n        print(\n            f\"DS: evaluation  ROC-AUC={m['roc_auc']:.4f}\
          \  F1={m['f1']:.4f}  \"\n            f\"Precision={m['precision']:.4f} \
          \ Recall={m['recall']:.4f}\"\n        )\n        return json.dumps(m)\n\n"
        env:
        - name: OPENLINEAGE_PARENT_JOB_NAME
          value: full-ml-rag-pipeline
        image: image-registry.openshift-image-registry.svc:5000/lineage/fkm-app:latest
    exec-ds-feature-engineering:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - ds_feature_engineering
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef ds_feature_engineering(\n    dataset: dsl.Input[dsl.Dataset],\n\
          \    output_path: dsl.Output[dsl.Dataset],\n) -> None:\n    \"\"\"Add derived\
          \ features.\"\"\"\n    import numpy as np\n    import pandas as pd\n   \
          \ from openlineage_oai.adapters.kfp import kfp_lineage, kfp_output_with_schema\n\
          \n    with kfp_lineage(\n        \"kfp-feature_engineering\",\n        inputs=[dataset],\n\
          \        outputs=[],\n        url=\"http://marquez\",\n    ) as run:\n \
          \       df = pd.read_parquet(dataset.path)\n        tenure_safe = df[\"\
          tenure_months\"].replace(0, 1)\n        df[\"charges_per_month\"] = df[\"\
          total_charges\"] / tenure_safe\n        df[\"ticket_rate\"] = df[\"num_support_tickets\"\
          ] / tenure_safe\n\n        for col in [\"charges_per_month\", \"ticket_rate\"\
          ]:\n            df[col] = df[col].replace([np.inf, -np.inf], 0.0)\n\n  \
          \      print(f\"DS: feature engineering complete - shape {df.shape}\")\n\
          \        df.to_parquet(output_path.path)\n        run.add_output(kfp_output_with_schema(output_path,\
          \ df))\n\n"
        env:
        - name: OPENLINEAGE_PARENT_JOB_NAME
          value: full-ml-rag-pipeline
        image: image-registry.openshift-image-registry.svc:5000/lineage/fkm-app:latest
    exec-ds-model-registration:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - ds_model_registration
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef ds_model_registration(\n    train_result_json: str,\n    metrics_json:\
          \ str,\n    model_name: str,\n    tracking_uri: str,\n    s3_endpoint: str,\n\
          \    aws_key: str,\n    aws_secret: str,\n    roc_auc_threshold: float,\n\
          ) -> str:\n    \"\"\"Register model in MLflow if metrics beat the threshold.\"\
          \"\"\n    import json\n    import os\n\n    import mlflow\n    from mlflow.tracking\
          \ import MlflowClient\n    from openlineage_oai.adapters.kfp import kfp_lineage\n\
          \n    os.environ[\"MLFLOW_S3_ENDPOINT_URL\"] = s3_endpoint\n    os.environ[\"\
          AWS_ACCESS_KEY_ID\"] = aws_key\n    os.environ[\"AWS_SECRET_ACCESS_KEY\"\
          ] = aws_secret\n\n    plain_uri = tracking_uri.replace(\"openlineage+\"\
          , \"\")\n    os.environ[\"MLFLOW_REGISTRY_URI\"] = plain_uri\n\n    ol_namespace\
          \ = os.environ.get(\"OPENLINEAGE_NAMESPACE\", \"default\")\n\n    with kfp_lineage(\n\
          \        \"kfp-model_registration\",\n        inputs=[{\"namespace\": ol_namespace,\
          \ \"name\": \"model.model\"}],\n        outputs=[{\"namespace\": \"mlflow\"\
          , \"name\": f\"models.{model_name}\"}],\n        url=\"http://marquez\"\
          ,\n    ):\n        result = json.loads(train_result_json)\n        metrics\
          \ = json.loads(metrics_json)\n\n        if metrics[\"roc_auc\"] < roc_auc_threshold:\n\
          \            print(f\"DS: model registration  ROC-AUC {metrics['roc_auc']:.4f}\
          \ < {roc_auc_threshold} - skipping\")\n            return json.dumps({\"\
          registered\": False, \"reason\": \"below_threshold\"})\n\n        mlflow.set_tracking_uri(tracking_uri)\n\
          \        try:\n            mv = mlflow.register_model(model_uri=result[\"\
          model_uri\"], name=model_name)\n            client = MlflowClient()\n  \
          \          client.set_registered_model_alias(model_name, \"champion\", str(mv.version))\n\
          \            print(f\"DS: registered {model_name} v{mv.version} as alias\
          \ 'champion'\")\n            return json.dumps({\n                \"registered\"\
          : True,\n                \"model_name\": model_name,\n                \"\
          version\": int(mv.version),\n                \"alias\": \"champion\",\n\
          \            })\n        except Exception as e:\n            print(f\"DS:\
          \ model registration failed (non-fatal): {e}\")\n            return json.dumps({\"\
          registered\": False, \"reason\": str(e)[:200]})\n\n"
        env:
        - name: OPENLINEAGE_PARENT_JOB_NAME
          value: full-ml-rag-pipeline
        image: image-registry.openshift-image-registry.svc:5000/lineage/fkm-app:latest
