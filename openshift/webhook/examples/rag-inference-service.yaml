---
# Example: RAG Inference Service with Intent-Based Lineage
#
# The developer declares datasource URIs using standard OpenLineage format.
# The webhook handles all lineage registration - NO OpenLineage SDK required!
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-inference-service
  namespace: lineage
  labels:
    app: rag-inference
    app.kubernetes.io/part-of: feast-kfp-mlflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rag-inference
  template:
    metadata:
      labels:
        app: rag-inference
        # Enable lineage registration via webhook
        # IMPORTANT: Must be a label (not annotation) for objectSelector to work
        lineage-enabled: "true"
      annotations:
        # Declare inputs using standard OpenLineage URI format
        # Format: scheme://authority/path
        #   - namespace = scheme://authority (where data lives)
        #   - name = path (what data it is)

        # Vector database for document retrieval
        ai.platform/input-0: "milvus://milvus:19530/ml_docs"

        # Feast online store for user features
        #ai.platform/input-1: "redis://redis:6379/customer_churn.customer_features_view"
        ai.platform/input-1: "feast://lineage/online_store_customer_features_view"
        # Model artifacts (in production this would be loaded from MLflow/S3)
        ai.platform/input-2: "s3://mlflow-minio:9000/models/llama3-70b-rag-v1"
        
        # Output: inference results cached in Redis
        ai.platform/output-0: "redis://redis:6379/rag_inference_cache"

    spec:
      volumes:
        - name: feast-config
          configMap:
            name: feast-config
      containers:
        - name: rag-service
          # Real RAG service that queries Milvus and Feast
          image: image-registry.openshift-image-registry.svc:5000/lineage/rag-inference-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          volumeMounts:
            - name: feast-config
              mountPath: /app/feast_repo
              readOnly: true
          env:
            # Milvus configuration
            - name: MILVUS_HOST
              value: "milvus"
            - name: MILVUS_PORT
              value: "19530"
            - name: MILVUS_COLLECTION
              value: "ml_docs"

            # Feast configuration
            # FEAST_REPO_PATH points to mounted ConfigMap with feature_store.yaml
            - name: FEAST_REPO_PATH
              value: "/app/feast_repo"

            # Model configuration
            - name: MODEL_NAME
              value: "llama3-70b-rag-v1"
            - name: TOP_K_DOCUMENTS
              value: "3"

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi

---
apiVersion: v1
kind: Service
metadata:
  name: rag-inference
  namespace: lineage
  labels:
    app: rag-inference
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: rag-inference

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: rag-inference
  namespace: lineage
  labels:
    app: rag-inference
spec:
  to:
    kind: Service
    name: rag-inference
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
