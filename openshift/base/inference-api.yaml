---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-api
  namespace: lineage
  labels:
    app: inference-api
    app.kubernetes.io/part-of: feast-kfp-mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inference-api
  template:
    metadata:
      labels:
        app: inference-api
    spec:
      initContainers:
        - name: wait-for-redis
          image: registry.access.redhat.com/ubi9:latest
          command:
            - bash
            - -c
            - |
              echo "Waiting for redis:6379 ..."
              until bash -c "echo > /dev/tcp/redis/6379" 2>/dev/null; do sleep 2; done
              echo "Redis is up"
        - name: wait-for-mlflow
          image: registry.access.redhat.com/ubi9:latest
          command:
            - bash
            - -c
            - |
              echo "Waiting for mlflow-server:5000 ..."
              until bash -c "echo > /dev/tcp/mlflow-server/5000" 2>/dev/null; do sleep 2; done
              echo "MLflow is up"
      containers:
        - name: inference-api
          image: image-registry.openshift-image-registry.svc:5000/lineage/fkm-app:latest
          command: ["uvicorn", "src.serving.app:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: fkm-config
            - secretRef:
                name: fkm-credentials
          volumeMounts:
            - name: feast-config
              mountPath: /app/src/feature_store/feature_store.yaml
              subPath: feature_store.yaml
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: feast-config
          configMap:
            name: feast-config

---
apiVersion: v1
kind: Service
metadata:
  name: inference-api
  namespace: lineage
  labels:
    app: inference-api
spec:
  selector:
    app: inference-api
  ports:
    - port: 8000
      targetPort: 8000
