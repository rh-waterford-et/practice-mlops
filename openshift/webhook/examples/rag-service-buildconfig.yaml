---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: rag-inference-app
  namespace: lineage
  labels:
    app.kubernetes.io/part-of: feast-kfp-mlflow

---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: rag-inference-app
  namespace: lineage
  labels:
    app.kubernetes.io/part-of: feast-kfp-mlflow
spec:
  source:
    type: Binary
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: rag-inference-app:latest
  resources:
    limits:
      cpu: "1"
      memory: 2Gi
