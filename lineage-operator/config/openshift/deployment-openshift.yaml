apiVersion: v1
kind: Namespace
metadata:
  name: lineage-operator-system

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lineage-operator-controller-manager
  namespace: lineage-operator-system
  labels:
    app: lineage-operator
    control-plane: controller-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lineage-operator
      control-plane: controller-manager
  template:
    metadata:
      labels:
        app: lineage-operator
        control-plane: controller-manager
    spec:
      serviceAccountName: lineage-operator
      containers:
        - name: manager
          image: image-registry.openshift-image-registry.svc:5000/lineage-operator-system/lineage-operator:latest
          imagePullPolicy: Always
          command:
            - /manager
          args:
            - --leader-elect
            - --marquez-url=$(MARQUEZ_URL)
            - --lineage-depth=$(LINEAGE_DEPTH)
          env:
            - name: MARQUEZ_URL
              value: "http://marquez.lineage.svc.cluster.local"
            - name: LINEAGE_DEPTH
              value: "3"
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
