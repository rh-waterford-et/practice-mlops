---
apiVersion: v1
kind: Secret
metadata:
  name: mlflow-db-secret
  namespace: lineage
type: Opaque
stringData:
  POSTGRES_USER: mlflow
  POSTGRES_PASSWORD: mlflow123
  POSTGRES_DB: mlflow

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-db
  namespace: lineage
  labels:
    app: mlflow-db
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mlflow-db
  template:
    metadata:
      labels:
        app: mlflow-db
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: mlflow-db-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "mlflow", "-d", "mlflow"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "mlflow", "-d", "mlflow"]
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: data
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-db
  namespace: lineage
spec:
  selector:
    app: mlflow-db
  ports:
    - port: 5432
      targetPort: 5432

---
apiVersion: v1
kind: Secret
metadata:
  name: mlflow-minio-secret
  namespace: lineage
type: Opaque
stringData:
  MINIO_ROOT_USER: minioadmin
  MINIO_ROOT_PASSWORD: minioadmin123

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-minio
  namespace: lineage
  labels:
    app: mlflow-minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow-minio
  template:
    metadata:
      labels:
        app: mlflow-minio
    spec:
      containers:
        - name: minio
          image: quay.io/minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: mlflow-minio-secret
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mlflow-minio-secret
                  key: MINIO_ROOT_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-minio
  namespace: lineage
spec:
  selector:
    app: mlflow-minio
  ports:
    - port: 9000
      targetPort: 9000
      name: api
    - port: 9001
      targetPort: 9001
      name: console

---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-create-buckets
  namespace: lineage
spec:
  ttlSecondsAfterFinished: 120
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: quay.io/minio/mc:latest
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: mlflow-minio-secret
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mlflow-minio-secret
                  key: MINIO_ROOT_PASSWORD
          command:
            - /bin/sh
            - -c
            - |
              until mc alias set myminio http://mlflow-minio:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD 2>/dev/null; do
                echo "Waiting for MinIO..."
                sleep 3
              done
              mc mb --ignore-existing myminio/mlflow
              mc mb --ignore-existing myminio/raw-data
              echo "Buckets created: mlflow, raw-data"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mlflow-config
  namespace: lineage
data:
  MLFLOW_HOST: "0.0.0.0"
  MLFLOW_PORT: "5000"
  MLFLOW_BACKEND_STORE_URI: "postgresql://mlflow:mlflow123@mlflow-db:5432/mlflow"
  MLFLOW_S3_ENDPOINT_URL: "http://mlflow-minio:9000"
  MLFLOW_ARTIFACTS_DESTINATION: "s3://mlflow/artifacts"
  AWS_DEFAULT_REGION: "us-east-1"
  MLFLOW_S3_IGNORE_TLS: "true"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-server
  namespace: lineage
  labels:
    app: mlflow-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow-server
  template:
    metadata:
      labels:
        app: mlflow-server
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v3.8.1
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: mlflow-config
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: mlflow-minio-secret
                  key: MINIO_ROOT_USER
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: mlflow-minio-secret
                  key: MINIO_ROOT_PASSWORD
          command:
            - /bin/bash
            - -c
            - |
              pip install --no-cache-dir --target /tmp/pip psycopg2-binary boto3
              export PYTHONPATH=/tmp/pip:$PYTHONPATH
              mlflow server \
                --backend-store-uri "${MLFLOW_BACKEND_STORE_URI}" \
                --artifacts-destination "${MLFLOW_ARTIFACTS_DESTINATION}" \
                --serve-artifacts \
                --host "${MLFLOW_HOST}" \
                --port "${MLFLOW_PORT}"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 90
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-server
  namespace: lineage
spec:
  selector:
    app: mlflow-server
  ports:
    - port: 5000
      targetPort: 5000
