          \ feature definitions. Emits OpenLineage events.\"\"\"\n    import os\n\
          \    import subprocess\n    from openlineage_oai.adapters.kfp import kfp_lineage\n\
          \n    ol_namespace = os.environ.get(\"OPENLINEAGE_NAMESPACE\", \"default\"\
          )\n    feast_project = ol_namespace.replace(\"-\", \"_\")\n    fs_yaml =\
          \ os.path.join(feast_repo_path, \"feature_store.yaml\")\n    with open(fs_yaml,\
          \ \"w\") as f:\n        f.write(f\"\"\"\\\nproject: {feast_project}\nprovider:\
          \ local\nregistry:\n  registry_type: sql\n  path: postgresql://feast:feast@{pg_host}:5432/warehouse\n\
          \  cache_ttl_seconds: 60\noffline_store:\n  type: postgres\n  host: {pg_host}\n\
          \  port: 5432\n  database: warehouse\n  db_schema: public\n  user: feast\n\
          \  password: feast\nonline_store:\n  type: redis\n  connection_string: {redis_host}:6379\n\
          entity_key_serialization_version: 2\nopenlineage:\n  enabled: true\n  transport_type:\
          \ http\n  transport_url: http://marquez\n  emit_on_apply: true\n  emit_on_materialize:\
          \ true\n\"\"\")\n    print(f\"Patched {fs_yaml} -> ol_ns={ol_namespace}\"\
          )\n\n    pg_ns = f\"postgres://{pg_host}:5432\"\n\n    feast_ns = ol_namespace.replace(\"\
          -\", \"_\")\n\n    with kfp_lineage(\n        \"kfp-feast_apply\",\n   \
