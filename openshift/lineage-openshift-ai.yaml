---
apiVersion: v1
kind: Secret
metadata:
  name: mlflow-minio-secret
  namespace: lineage
  labels:
    app: mlflow-minio
    app.kubernetes.io/part-of: feast-kfp-mlflow
type: Opaque
stringData:
  MINIO_ROOT_USER: "minioadmin"
  MINIO_ROOT_PASSWORD: "minioadmin123"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mlflow-config
  namespace: lineage
  labels:
    app: mlflow-server
    app.kubernetes.io/part-of: feast-kfp-mlflow
data:
  MLFLOW_BACKEND_STORE_URI: "postgresql://mlflow:mlflow123@mlflow-db:5432/mlflow"
  MLFLOW_ARTIFACTS_DESTINATION: "s3://mlflow/artifacts"
  MLFLOW_S3_ENDPOINT_URL: "http://mlflow-minio:9000"
  MLFLOW_S3_IGNORE_TLS: "true"
  MLFLOW_HOST: "0.0.0.0"
  MLFLOW_PORT: "5000"
  # In-cluster KFP pods use Host: mlflow-server:5000; MLflow 3 rejects unknown hosts by default.
  MLFLOW_SERVER_ALLOWED_HOSTS: "*"
  AWS_DEFAULT_REGION: "us-east-1"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-server
  namespace: lineage
  labels:
    app: mlflow-server
    app.kubernetes.io/part-of: feast-kfp-mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow-server
  template:
    metadata:
      labels:
        app: mlflow-server
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v3.8.1
          ports:
            - containerPort: 5000
          command:
            - /bin/bash
            - -c
            - |
              pip install --no-cache-dir --target /tmp/pip psycopg2-binary boto3
              export PYTHONPATH=/tmp/pip:$PYTHONPATH
              mlflow server \
                --backend-store-uri "${MLFLOW_BACKEND_STORE_URI}" \
                --artifacts-destination "${MLFLOW_ARTIFACTS_DESTINATION}" \
                --serve-artifacts \
                --host "${MLFLOW_HOST}" \
                --port "${MLFLOW_PORT}"
          env:
            - name: AWS_ACCESS_KEY_ID
