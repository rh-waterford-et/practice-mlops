---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: dataset-registry-ui
  namespace: lineage
  labels:
    app.kubernetes.io/part-of: dataset-registry

---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: dataset-registry-ui
  namespace: lineage
  labels:
    app.kubernetes.io/part-of: dataset-registry
spec:
  source:
    type: Binary
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: dataset-registry-ui:latest

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dataset-registry-ui
  namespace: lineage
  labels:
    app: dataset-registry-ui
    app.kubernetes.io/part-of: dataset-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dataset-registry-ui
  template:
    metadata:
      labels:
        app: dataset-registry-ui
    spec:
      containers:
        - name: ui
          image: image-registry.openshift-image-registry.svc:5000/lineage/dataset-registry-ui:latest
          env:
            - name: MARQUEZ_WEB_URL
              value: "https://marquez-web-lineage.apps.rosa.catoconn-ray-et.bo0z.p3.openshiftapps.com"
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi

---
apiVersion: v1
kind: Service
metadata:
  name: dataset-registry-ui
  namespace: lineage
  labels:
    app: dataset-registry-ui
    app.kubernetes.io/part-of: dataset-registry
spec:
  selector:
    app: dataset-registry-ui
  ports:
    - port: 8080
      targetPort: 8080
