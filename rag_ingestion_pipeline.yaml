# PIPELINE DEFINITION
# Name: rag-document-ingestion-pipeline
# Description: End-to-end RAG ingestion: load documents, chunk, embed, store in Milvus. Each step emits OpenLineage events tracking inputs/outputs. OPENLINEAGE_NAMESPACE injected by Argo workflow controller.
# Inputs:
#    aws_key: str [Default: 'minioadmin']
#    aws_secret: str [Default: 'minioadmin123']
#    bucket_name: str [Default: 'data']
#    chunk_overlap: int [Default: 200.0]
#    chunk_size: int [Default: 1000.0]
#    collection_name: str [Default: 'ml_docs']
#    document_prefix: str [Default: 'sample_docs/']
#    embedding_model: str [Default: 'all-MiniLM-L6-v2']
#    milvus_host: str [Default: 'milvus']
#    milvus_port: int [Default: 19530.0]
#    minio_endpoint: str [Default: 'mlflow-minio:9000']
#    openlineage_url: str [Default: 'http://marquez']
components:
  comp-chunk-documents:
    executorLabel: exec-chunk-documents
    inputDefinitions:
      artifacts:
        input_docs:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        chunk_overlap:
          parameterType: NUMBER_INTEGER
        chunk_size:
          parameterType: NUMBER_INTEGER
        minio_endpoint:
          parameterType: STRING
        openlineage_url:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        output_chunks:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: NUMBER_INTEGER
  comp-generate-embeddings:
    executorLabel: exec-generate-embeddings
    inputDefinitions:
      artifacts:
        input_chunks:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        minio_endpoint:
          parameterType: STRING
        model_name:
          parameterType: STRING
        openlineage_url:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        output_embeddings:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: STRING
  comp-load-documents:
    executorLabel: exec-load-documents
    inputDefinitions:
      parameters:
        aws_key:
          parameterType: STRING
        aws_secret:
          parameterType: STRING
        bucket_name:
          parameterType: STRING
        minio_endpoint:
          parameterType: STRING
        openlineage_url:
          parameterType: STRING
        prefix:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        output_docs:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: NUMBER_INTEGER
  comp-store-in-milvus:
    executorLabel: exec-store-in-milvus
    inputDefinitions:
      artifacts:
        input_embeddings:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        collection_name:
          parameterType: STRING
        milvus_host:
          parameterType: STRING
        milvus_port:
          parameterType: NUMBER_INTEGER
        minio_endpoint:
          parameterType: STRING
        openlineage_url:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-chunk-documents:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - chunk_documents
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef chunk_documents(\n    input_docs: dsl.Input[dsl.Dataset],\n \
          \   chunk_size: int,\n    chunk_overlap: int,\n    minio_endpoint: str,\n\
          \    openlineage_url: str,\n    output_chunks: dsl.Output[dsl.Dataset],\n\
          ) -> int:\n    \"\"\"Split documents into chunks with overlap.\"\"\"\n \
          \   import json\n    import gc\n    import os\n    from datetime import\
          \ datetime, timezone\n    from uuid import uuid4\n    from openlineage.client\
          \ import OpenLineageClient\n    from openlineage.client.run import RunEvent,\
          \ RunState, Run, Job, Dataset\n    from openlineage.client.facet import\
          \ SchemaDatasetFacet, SchemaField, OutputStatisticsOutputDatasetFacet\n\n\
          \    # Load documents\n    with open(input_docs.path) as f:\n        documents\
          \ = json.load(f)\n\n    print(f\"Loaded {len(documents)} documents\")\n\n\
          \    # Process one document at a time and write incrementally to save memory\n\
          \    chunks = []\n    chunk_id = 0\n    total_chars = 0\n\n    for idx,\
          \ doc in enumerate(documents):\n        content = doc[\"content\"]\n   \
          \     doc_chunks = []\n\n        # Simple character-based chunking\n   \
          \     start = 0\n        while start < len(content):\n            end =\
          \ min(start + chunk_size, len(content))\n            chunk_text = content[start:end]\n\
          \n            # Try to break at sentence boundaries if possible\n      \
          \      if end < len(content):\n                # Look for last period, newline,\
          \ or space\n                for delimiter in ['. ', '\\n\\n', '\\n', ' ']:\n\
          \                    last_delim = chunk_text.rfind(delimiter)\n        \
          \            if last_delim > chunk_size // 2:  # At least halfway through\n\
          \                        end = start + last_delim + len(delimiter)\n   \
          \                     chunk_text = content[start:end]\n                \
          \        break\n\n            chunk_stripped = chunk_text.strip()\n    \
          \        doc_chunks.append({\n                \"chunk_id\": chunk_id,\n\
          \                \"source\": doc[\"source\"],\n                \"filename\"\
          : doc[\"filename\"],\n                \"text\": chunk_stripped,\n      \
          \          \"start_char\": start,\n                \"end_char\": end,\n\
          \            })\n            total_chars += len(chunk_stripped)\n\n    \
          \        chunk_id += 1\n            start = max(end - chunk_overlap, start\
          \ + 1)\n\n        chunks.extend(doc_chunks)\n        print(f\"Processed\
          \ document {idx + 1}/{len(documents)}: {len(doc_chunks)} chunks\")\n\n \
          \       # Clear references to free memory\n        del doc_chunks\n    \
          \    del content\n        gc.collect()\n\n    # Save chunks\n    print(f\"\
          Writing {len(chunks)} total chunks to output\")\n    with open(output_chunks.path,\
          \ 'w') as f:\n        json.dump(chunks, f)\n\n    # Emit OpenLineage event\n\
          \    namespace = os.environ.get(\"OPENLINEAGE_NAMESPACE\", \"default\")\n\
          \    ol_client = OpenLineageClient(url=openlineage_url)\n    run_id = str(uuid4())\n\
          \n    input_dataset = Dataset(\n        namespace=f\"s3://{minio_endpoint}\"\
          ,\n        name=\"mlflow/artifacts/rag-ingestion/documents\",\n        facets={},\n\
          \    )\n\n    output_dataset = Dataset(\n        namespace=f\"s3://{minio_endpoint}\"\
          ,\n        name=\"mlflow/artifacts/rag-ingestion/chunks\",\n        facets={\n\
          \            \"schema\": SchemaDatasetFacet(\n                fields=[\n\
          \                    SchemaField(name=\"chunk_id\", type=\"INTEGER\"),\n\
          \                    SchemaField(name=\"source\", type=\"STRING\"),\n  \
          \                  SchemaField(name=\"filename\", type=\"STRING\"),\n  \
          \                  SchemaField(name=\"text\", type=\"TEXT\"),\n        \
          \            SchemaField(name=\"start_char\", type=\"INTEGER\"),\n     \
          \               SchemaField(name=\"end_char\", type=\"INTEGER\"),\n    \
          \            ]\n            ),\n            \"outputStatistics\": OutputStatisticsOutputDatasetFacet(\n\
          \                rowCount=len(chunks),\n                size=total_chars,\n\
          \            ),\n        },\n    )\n\n    event = RunEvent(\n        eventType=RunState.COMPLETE,\n\
          \        eventTime=datetime.now(timezone.utc).isoformat(),\n        run=Run(runId=run_id,\
          \ facets={}),\n        job=Job(namespace=namespace, name=\"rag_chunk_documents\"\
          , facets={}),\n        inputs=[input_dataset],\n        outputs=[output_dataset],\n\
          \        producer=\"rag-ingestion-pipeline/chunk\",\n    )\n    ol_client.emit(event)\n\
          \    print(f\"OpenLineage event emitted: {namespace}/rag_chunk_documents\"\
          )\n\n    del chunks\n    gc.collect()\n\n    print(f\"Created {chunk_id}\
          \ chunks from {len(documents)} documents\")\n    return chunk_id\n\n"
        image: image-registry.openshift-image-registry.svc:5000/lineage/fkm-app:latest
    exec-generate-embeddings:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - generate_embeddings
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef generate_embeddings(\n    input_chunks: dsl.Input[dsl.Dataset],\n\
          \    model_name: str,\n    minio_endpoint: str,\n    openlineage_url: str,\n\
          \    output_embeddings: dsl.Output[dsl.Dataset],\n) -> str:\n    \"\"\"\
          Generate embeddings using sentence-transformers.\"\"\"\n    import json\n\
          \    import os\n    from datetime import datetime, timezone\n    from uuid\
          \ import uuid4\n    from sentence_transformers import SentenceTransformer\n\
          \    from openlineage.client import OpenLineageClient\n    from openlineage.client.run\
          \ import RunEvent, RunState, Run, Job, Dataset\n    from openlineage.client.facet\
          \ import SchemaDatasetFacet, SchemaField, OutputStatisticsOutputDatasetFacet\n\
          \n    with open(input_chunks.path) as f:\n        chunks = json.load(f)\n\
          \n    print(f\"Loading model: {model_name}\")\n    model = SentenceTransformer(model_name)\n\
          \n    # Extract texts\n    texts = [chunk[\"text\"] for chunk in chunks]\n\
          \n    print(f\"Generating embeddings for {len(texts)} chunks...\")\n   \
          \ embeddings = model.encode(texts, show_progress_bar=True)\n\n    # Add\
          \ embeddings to chunks\n    for chunk, embedding in zip(chunks, embeddings):\n\
          \        chunk[\"embedding\"] = embedding.tolist()\n\n    # Save chunks\
          \ with embeddings\n    with open(output_embeddings.path, 'w') as f:\n  \
          \      json.dump(chunks, f)\n\n    embedding_dim = embeddings.shape[1]\n\
          \    print(f\"Generated {len(embeddings)} embeddings of dimension {embedding_dim}\"\
          )\n\n    # Emit OpenLineage event\n    namespace = os.environ.get(\"OPENLINEAGE_NAMESPACE\"\
          , \"default\")\n    ol_client = OpenLineageClient(url=openlineage_url)\n\
          \    run_id = str(uuid4())\n\n    input_dataset = Dataset(\n        namespace=f\"\
          s3://{minio_endpoint}\",\n        name=\"mlflow/artifacts/rag-ingestion/chunks\"\
          ,\n        facets={},\n    )\n\n    output_dataset = Dataset(\n        namespace=f\"\
          s3://{minio_endpoint}\",\n        name=\"mlflow/artifacts/rag-ingestion/embeddings\"\
          ,\n        facets={\n            \"schema\": SchemaDatasetFacet(\n     \
          \           fields=[\n                    SchemaField(name=\"chunk_id\"\
          , type=\"INTEGER\"),\n                    SchemaField(name=\"source\", type=\"\
          STRING\"),\n                    SchemaField(name=\"filename\", type=\"STRING\"\
          ),\n                    SchemaField(name=\"text\", type=\"TEXT\"),\n   \
          \                 SchemaField(name=\"start_char\", type=\"INTEGER\"),\n\
          \                    SchemaField(name=\"end_char\", type=\"INTEGER\"),\n\
          \                    SchemaField(name=\"embedding\", type=f\"FLOAT_VECTOR({embedding_dim})\"\
          ),\n                ]\n            ),\n            \"outputStatistics\"\
          : OutputStatisticsOutputDatasetFacet(\n                rowCount=len(embeddings),\n\
          \            ),\n        },\n    )\n\n    event = RunEvent(\n        eventType=RunState.COMPLETE,\n\
          \        eventTime=datetime.now(timezone.utc).isoformat(),\n        run=Run(runId=run_id,\
          \ facets={}),\n        job=Job(\n            namespace=namespace,\n    \
          \        name=\"rag_generate_embeddings\",\n            facets={},\n   \
          \     ),\n        inputs=[input_dataset],\n        outputs=[output_dataset],\n\
          \        producer=f\"rag-ingestion-pipeline/embed/{model_name}\",\n    )\n\
          \    ol_client.emit(event)\n    print(f\"OpenLineage event emitted: {namespace}/rag_generate_embeddings\"\
          )\n\n    return json.dumps({\n        \"model\": model_name,\n        \"\
          num_embeddings\": len(embeddings),\n        \"embedding_dim\": int(embedding_dim),\n\
          \    })\n\n"
        image: image-registry.openshift-image-registry.svc:5000/lineage/rag-app:latest
    exec-load-documents:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - load_documents
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef load_documents(\n    minio_endpoint: str,\n    bucket_name: str,\n\
          \    prefix: str,\n    aws_key: str,\n    aws_secret: str,\n    openlineage_url:\
          \ str,\n    output_docs: dsl.Output[dsl.Dataset],\n) -> int:\n    \"\"\"\
          Load documents from MinIO and save metadata.\"\"\"\n    import json\n  \
          \  import os\n    from datetime import datetime, timezone\n    from uuid\
          \ import uuid4\n    from minio import Minio\n    from openlineage.client\
          \ import OpenLineageClient\n    from openlineage.client.run import RunEvent,\
          \ RunState, Run, Job, Dataset\n    from openlineage.client.facet import\
          \ SchemaDatasetFacet, SchemaField, OutputStatisticsOutputDatasetFacet\n\n\
          \    os.environ[\"AWS_ACCESS_KEY_ID\"] = aws_key\n    os.environ[\"AWS_SECRET_ACCESS_KEY\"\
          ] = aws_secret\n\n    client = Minio(\n        minio_endpoint,\n       \
          \ access_key=aws_key,\n        secret_key=aws_secret,\n        secure=False,\n\
          \    )\n\n    documents = []\n    source_files = []\n    total_size = 0\n\
          \    objects = client.list_objects(bucket_name, prefix=prefix, recursive=True)\n\
          \n    for obj in objects:\n        if obj.object_name.endswith(('.txt',\
          \ '.md', '.pdf')):\n            # Download document\n            response\
          \ = client.get_object(bucket_name, obj.object_name)\n            content\
          \ = response.read().decode('utf-8')\n            response.close()\n    \
          \        response.release_conn()\n\n            documents.append({\n   \
          \             \"source\": f\"s3://{bucket_name}/{obj.object_name}\",\n \
          \               \"content\": content,\n                \"size\": len(content),\n\
          \                \"filename\": obj.object_name.split('/')[-1],\n       \
          \     })\n            source_files.append(obj.object_name)\n           \
          \ total_size += len(content)\n\n    # Save documents as JSON (without indent\
          \ to save memory)\n    with open(output_docs.path, 'w') as f:\n        json.dump(documents,\
          \ f)\n\n    print(f\"Loaded {len(documents)} documents from MinIO\")\n\n\
          \    # Emit OpenLineage event\n    namespace = os.environ.get(\"OPENLINEAGE_NAMESPACE\"\
          , \"default\")\n    ol_client = OpenLineageClient(url=openlineage_url)\n\
          \    run_id = str(uuid4())\n\n    # Input: grouped MinIO bucket prefix (all\
          \ files as single source)\n    input_dataset = Dataset(\n        namespace=f\"\
          s3://{minio_endpoint}\",\n        name=f\"{bucket_name}/{prefix}\",\n  \
          \      facets={\n            \"schema\": SchemaDatasetFacet(\n         \
          \       fields=[\n                    SchemaField(name=\"filename\", type=\"\
          STRING\"),\n                    SchemaField(name=\"content\", type=\"TEXT\"\
          ),\n                ]\n            ),\n        },\n    )\n\n    # Output:\
          \ documents JSON dataset (stored as KFP artifact in MinIO)\n    output_dataset\
          \ = Dataset(\n        namespace=f\"s3://{minio_endpoint}\",\n        name=\"\
          mlflow/artifacts/rag-ingestion/documents\",\n        facets={\n        \
          \    \"schema\": SchemaDatasetFacet(\n                fields=[\n       \
          \             SchemaField(name=\"source\", type=\"STRING\"),\n         \
          \           SchemaField(name=\"content\", type=\"TEXT\"),\n            \
          \        SchemaField(name=\"size\", type=\"INTEGER\"),\n               \
          \     SchemaField(name=\"filename\", type=\"STRING\"),\n               \
          \ ]\n            ),\n            \"outputStatistics\": OutputStatisticsOutputDatasetFacet(\n\
          \                rowCount=len(documents),\n                size=total_size,\n\
          \            ),\n        },\n    )\n\n    event = RunEvent(\n        eventType=RunState.COMPLETE,\n\
          \        eventTime=datetime.now(timezone.utc).isoformat(),\n        run=Run(runId=run_id,\
          \ facets={}),\n        job=Job(namespace=namespace, name=\"rag_load_documents\"\
          , facets={}),\n        inputs=[input_dataset],\n        outputs=[output_dataset],\n\
          \        producer=\"rag-ingestion-pipeline/load\",\n    )\n    ol_client.emit(event)\n\
          \    print(f\"OpenLineage event emitted: {namespace}/rag_load_documents\"\
          )\n\n    return len(documents)\n\n"
        image: image-registry.openshift-image-registry.svc:5000/lineage/fkm-app:latest
    exec-store-in-milvus:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - store_in_milvus
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef store_in_milvus(\n    input_embeddings: dsl.Input[dsl.Dataset],\n\
          \    milvus_host: str,\n    milvus_port: int,\n    collection_name: str,\n\
          \    minio_endpoint: str,\n    openlineage_url: str,\n) -> str:\n    \"\"\
          \"Store embeddings in Milvus vector database and emit OpenLineage event.\"\
          \"\"\n    import json\n    import os\n    from datetime import datetime,\
          \ timezone\n    from uuid import uuid4\n    from pymilvus import (\n   \
          \     connections,\n        Collection,\n        CollectionSchema,\n   \
          \     FieldSchema,\n        DataType,\n        utility,\n    )\n    from\
          \ openlineage.client import OpenLineageClient\n    from openlineage.client.run\
          \ import RunEvent, RunState, Run, Job, Dataset\n    from openlineage.client.facet\
          \ import (\n        SchemaDatasetFacet,\n        SchemaField,\n        OutputStatisticsOutputDatasetFacet,\n\
          \    )\n\n    with open(input_embeddings.path) as f:\n        chunks = json.load(f)\n\
          \n    embedding_dim = len(chunks[0][\"embedding\"])\n\n    # Connect to\
          \ Milvus\n    print(f\"Connecting to Milvus at {milvus_host}:{milvus_port}\"\
          )\n    connections.connect(\n        alias=\"default\",\n        host=milvus_host,\n\
          \        port=milvus_port,\n    )\n\n    # Create collection if it doesn't\
          \ exist\n    if utility.has_collection(collection_name):\n        print(f\"\
          Collection '{collection_name}' already exists, dropping it...\")\n     \
          \   utility.drop_collection(collection_name)\n\n    # Define collection\
          \ schema\n    fields = [\n        FieldSchema(name=\"id\", dtype=DataType.INT64,\
          \ is_primary=True, auto_id=True),\n        FieldSchema(name=\"chunk_id\"\
          , dtype=DataType.INT64),\n        FieldSchema(name=\"source\", dtype=DataType.VARCHAR,\
          \ max_length=512),\n        FieldSchema(name=\"filename\", dtype=DataType.VARCHAR,\
          \ max_length=256),\n        FieldSchema(name=\"text\", dtype=DataType.VARCHAR,\
          \ max_length=65535),\n        FieldSchema(name=\"start_char\", dtype=DataType.INT64),\n\
          \        FieldSchema(name=\"end_char\", dtype=DataType.INT64),\n       \
          \ FieldSchema(name=\"embedding\", dtype=DataType.FLOAT_VECTOR, dim=embedding_dim),\n\
          \    ]\n\n    schema = CollectionSchema(\n        fields=fields,\n     \
          \   description=f\"RAG document chunks for {collection_name}\",\n    )\n\
          \n    print(f\"Creating collection '{collection_name}' with {embedding_dim}-dim\
          \ embeddings...\")\n    collection = Collection(\n        name=collection_name,\n\
          \        schema=schema,\n    )\n\n    # Prepare data for insertion\n   \
          \ data = [\n        [chunk[\"chunk_id\"] for chunk in chunks],  # chunk_id\n\
          \        [chunk[\"source\"] for chunk in chunks],  # source\n        [chunk[\"\
          filename\"] for chunk in chunks],  # filename\n        [chunk[\"text\"]\
          \ for chunk in chunks],  # text\n        [chunk[\"start_char\"] for chunk\
          \ in chunks],  # start_char\n        [chunk[\"end_char\"] for chunk in chunks],\
          \  # end_char\n        [chunk[\"embedding\"] for chunk in chunks],  # embedding\
          \ vectors\n    ]\n\n    # Insert data\n    print(f\"Inserting {len(chunks)}\
          \ chunks into Milvus...\")\n    collection.insert(data)\n\n    # Create\
          \ index for vector similarity search\n    print(\"Creating IVF_FLAT index\
          \ for similarity search...\")\n    index_params = {\n        \"metric_type\"\
          : \"COSINE\",\n        \"index_type\": \"IVF_FLAT\",\n        \"params\"\
          : {\"nlist\": 128},\n    }\n    collection.create_index(\n        field_name=\"\
          embedding\",\n        index_params=index_params,\n    )\n\n    # Load collection\
          \ into memory\n    collection.load()\n\n    # Get collection stats\n   \
          \ num_entities = collection.num_entities\n    print(f\"Stored {num_entities}\
          \ chunks in Milvus collection: {collection_name}\")\n\n    # Disconnect\
          \ from Milvus\n    connections.disconnect(\"default\")\n\n    # Get namespace\
          \ from environment (injected by Argo workflow controller)\n    namespace\
          \ = os.environ.get(\"OPENLINEAGE_NAMESPACE\", \"default\")\n\n    # Emit\
          \ OpenLineage event\n    ol_client = OpenLineageClient(url=openlineage_url)\n\
          \n    run_id = str(uuid4())\n    now = datetime.now(timezone.utc).isoformat()\n\
          \n    # Input: embeddings from previous step (stored in MinIO as KFP artifact)\n\
          \    input_dataset = Dataset(\n        namespace=f\"s3://{minio_endpoint}\"\
          ,\n        name=\"mlflow/artifacts/rag-ingestion/embeddings\",\n       \
          \ facets={},\n    )\n\n    # Create schema facet for Milvus collection\n\
          \    schema_fields = [\n        SchemaField(name=\"id\", type=\"INT64\"\
          , description=\"Auto-generated primary key\"),\n        SchemaField(name=\"\
          chunk_id\", type=\"INT64\", description=\"Chunk identifier\"),\n       \
          \ SchemaField(name=\"source\", type=\"VARCHAR(512)\", description=\"Source\
          \ document path\"),\n        SchemaField(name=\"filename\", type=\"VARCHAR(256)\"\
          , description=\"Source filename\"),\n        SchemaField(name=\"text\",\
          \ type=\"VARCHAR(65535)\", description=\"Chunk text content\"),\n      \
          \  SchemaField(name=\"start_char\", type=\"INT64\", description=\"Start\
          \ character position\"),\n        SchemaField(name=\"end_char\", type=\"\
          INT64\", description=\"End character position\"),\n        SchemaField(name=\"\
          embedding\", type=f\"FLOAT_VECTOR({embedding_dim})\", description=\"Vector\
          \ embedding\"),\n    ]\n\n    output_dataset = Dataset(\n        namespace=f\"\
          milvus://{milvus_host}:{milvus_port}\",\n        name=collection_name,\n\
          \        facets={\n            \"schema\": SchemaDatasetFacet(fields=schema_fields),\n\
          \            \"outputStatistics\": OutputStatisticsOutputDatasetFacet(\n\
          \                rowCount=num_entities,\n                size=sum(len(chunk[\"\
          text\"]) for chunk in chunks),\n            ),\n        },\n    )\n\n  \
          \  # Create the job\n    job = Job(\n        namespace=namespace,\n    \
          \    name=\"rag_store_milvus\",\n        facets={},\n    )\n\n    # Create\
          \ the run\n    run = Run(runId=run_id, facets={})\n\n    # Emit COMPLETE\
          \ event\n    event = RunEvent(\n        eventType=RunState.COMPLETE,\n \
          \       eventTime=now,\n        run=run,\n        job=job,\n        inputs=[input_dataset],\n\
          \        outputs=[output_dataset],\n        producer=\"rag-ingestion-pipeline/milvus\"\
          ,\n    )\n\n    ol_client.emit(event)\n    print(f\"OpenLineage event emitted:\
          \ {namespace}/rag_store_milvus (run: {run_id})\")\n\n    return json.dumps({\n\
          \        \"collection_name\": collection_name,\n        \"num_chunks\":\
          \ num_entities,\n        \"embedding_dim\": embedding_dim,\n        \"index_type\"\
          : \"IVF_FLAT\",\n        \"metric_type\": \"COSINE\",\n        \"openlineage_run_id\"\
          : run_id,\n    })\n\n"
        image: image-registry.openshift-image-registry.svc:5000/lineage/rag-app:latest
pipelineInfo:
  description: 'End-to-end RAG ingestion: load documents, chunk, embed, store in Milvus.
    Each step emits OpenLineage events tracking inputs/outputs. OPENLINEAGE_NAMESPACE
    injected by Argo workflow controller.'
  name: rag-document-ingestion-pipeline
root:
  dag:
    tasks:
      chunk-documents:
        cachingOptions: {}
        componentRef:
          name: comp-chunk-documents
        dependentTasks:
        - load-documents
        inputs:
          artifacts:
            input_docs:
              taskOutputArtifact:
                outputArtifactKey: output_docs
                producerTask: load-documents
          parameters:
            chunk_overlap:
              componentInputParameter: chunk_overlap
            chunk_size:
              componentInputParameter: chunk_size
            minio_endpoint:
              componentInputParameter: minio_endpoint
            openlineage_url:
              componentInputParameter: openlineage_url
        taskInfo:
          name: chunk-documents
      generate-embeddings:
        cachingOptions: {}
        componentRef:
          name: comp-generate-embeddings
        dependentTasks:
        - chunk-documents
        inputs:
          artifacts:
            input_chunks:
              taskOutputArtifact:
                outputArtifactKey: output_chunks
                producerTask: chunk-documents
          parameters:
            minio_endpoint:
              componentInputParameter: minio_endpoint
            model_name:
              componentInputParameter: embedding_model
            openlineage_url:
              componentInputParameter: openlineage_url
        taskInfo:
          name: generate-embeddings
      load-documents:
        cachingOptions: {}
        componentRef:
          name: comp-load-documents
        inputs:
          parameters:
            aws_key:
              componentInputParameter: aws_key
            aws_secret:
              componentInputParameter: aws_secret
            bucket_name:
              componentInputParameter: bucket_name
            minio_endpoint:
              componentInputParameter: minio_endpoint
            openlineage_url:
              componentInputParameter: openlineage_url
            prefix:
              componentInputParameter: document_prefix
        taskInfo:
          name: load-documents
      store-in-milvus:
        cachingOptions: {}
        componentRef:
          name: comp-store-in-milvus
        dependentTasks:
        - generate-embeddings
        inputs:
          artifacts:
            input_embeddings:
              taskOutputArtifact:
                outputArtifactKey: output_embeddings
                producerTask: generate-embeddings
          parameters:
            collection_name:
              componentInputParameter: collection_name
            milvus_host:
              componentInputParameter: milvus_host
            milvus_port:
              componentInputParameter: milvus_port
            minio_endpoint:
              componentInputParameter: minio_endpoint
            openlineage_url:
              componentInputParameter: openlineage_url
        taskInfo:
          name: store-in-milvus
  inputDefinitions:
    parameters:
      aws_key:
        defaultValue: minioadmin
        isOptional: true
        parameterType: STRING
      aws_secret:
        defaultValue: minioadmin123
        isOptional: true
        parameterType: STRING
      bucket_name:
        defaultValue: data
        isOptional: true
        parameterType: STRING
      chunk_overlap:
        defaultValue: 200.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      chunk_size:
        defaultValue: 1000.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      collection_name:
        defaultValue: ml_docs
        isOptional: true
        parameterType: STRING
      document_prefix:
        defaultValue: sample_docs/
        isOptional: true
        parameterType: STRING
      embedding_model:
        defaultValue: all-MiniLM-L6-v2
        isOptional: true
        parameterType: STRING
      milvus_host:
        defaultValue: milvus
        isOptional: true
        parameterType: STRING
      milvus_port:
        defaultValue: 19530.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      minio_endpoint:
        defaultValue: mlflow-minio:9000
