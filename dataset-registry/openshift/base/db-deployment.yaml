---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-db-data
  namespace: lineage
  labels:
    app: registry-db
    app.kubernetes.io/part-of: dataset-registry
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry-db
  namespace: lineage
  labels:
    app: registry-db
    app.kubernetes.io/part-of: dataset-registry
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: registry-db
  template:
    metadata:
      labels:
        app: registry-db
    spec:
      containers:
        - name: postgres
          image: quay.io/sclorg/postgresql-15-c9s:latest
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRESQL_USER
              value: registry
            - name: POSTGRESQL_PASSWORD
              value: registry
            - name: POSTGRESQL_DATABASE
              value: registry
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgsql/data
          readinessProbe:
            exec:
              command: ["bash", "-c", "pg_isready -h 127.0.0.1 -p 5432"]
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["bash", "-c", "pg_isready -h 127.0.0.1 -p 5432"]
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: registry-db-data

---
apiVersion: v1
kind: Service
metadata:
  name: registry-db
  namespace: lineage
  labels:
    app: registry-db
    app.kubernetes.io/part-of: dataset-registry
spec:
  selector:
    app: registry-db
  ports:
    - port: 5432
      targetPort: 5432
