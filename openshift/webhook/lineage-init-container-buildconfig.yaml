---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: lineage-init-container
  namespace: lineage
  labels:
    app.kubernetes.io/part-of: feast-kfp-mlflow
    component: platform-engineering

---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: lineage-init-container
  namespace: lineage
  labels:
    app.kubernetes.io/part-of: feast-kfp-mlflow
    component: platform-engineering
spec:
  source:
    type: Binary
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: lineage-init-container:latest
  resources:
    limits:
      cpu: "500m"
      memory: 1Gi
