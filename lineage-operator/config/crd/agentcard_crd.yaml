apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agentcards.lineage.ai.platform
spec:
  group: lineage.ai.platform
  names:
    kind: AgentCard
    listKind: AgentCardList
    plural: agentcards
    singular: agentcard
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                syncPeriod:
                  type: string
            status:
              type: object
              properties:
                protocol:
                  type: string
                lastSyncTime:
                  type: string
                  format: date-time
                card:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
