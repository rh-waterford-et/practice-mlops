          }],\n        outputs=[\n            {\"namespace\": pg_ns, \"name\": \"\
          warehouse.customer_features_view\"},\n        ],\n        url=\"http://marquez\"\
          ,\n    ):\n        env = os.environ.copy()\n        env[\"REDIS_PORT\"]\
          \ = \"6379\"\n        result = subprocess.run(\n            [\"feast\",\
          \ \"apply\"],\n            cwd=feast_repo_path,\n            capture_output=True,\
          \ text=True,\n            env=env,\n        )\n        print(result.stdout)\n\
          \        if result.returncode != 0:\n            print(f\"STDERR: {result.stderr}\"\
          )\n            raise RuntimeError(f\"feast apply failed: {result.stderr[:500]}\"\
          )\n        print(\"Platform: feast apply succeeded\")\n    return \"applied\"\
          \n\n"
