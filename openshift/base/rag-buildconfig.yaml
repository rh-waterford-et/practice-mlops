---
# ImageStream for RAG pipeline image
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: rag-app
  namespace: lineage
  labels:
    app.kubernetes.io/part-of: feast-kfp-mlflow

---
# BuildConfig for minimal RAG image
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: rag-app
  namespace: lineage
  labels:
    app.kubernetes.io/part-of: feast-kfp-mlflow
spec:
  source:
    type: Binary
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile.rag
  output:
    to:
      kind: ImageStreamTag
      name: rag-app:latest
  resources:
    limits:
      cpu: "4"
      memory: 8Gi
