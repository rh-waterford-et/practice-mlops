            - name: WEB_PORT
              value: "3000"
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: http
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: marquez-web
  namespace: lineage
  labels:
    app.kubernetes.io/component: web
    app.kubernetes.io/name: marquez
    app.kubernetes.io/part-of: feast-kfp-mlflow
spec:
  selector:
    app.kubernetes.io/component: web
    app.kubernetes.io/name: marquez
  ports:
    - name: http
      port: 80
      targetPort: http
