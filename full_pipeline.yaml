        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef platform_feast_materialize(\n    feast_repo_path: str,\n    pg_host:\
          \ str,\n    redis_host: str,\n    apply_done: str,\n) -> str:\n    \"\"\"\
          Materialize features from offline to online store. Emits OpenLineage events.\"\
          \"\"\n    import os\n    from datetime import datetime, timedelta\n    from\
          \ feast import FeatureStore\n    from openlineage_oai.adapters.kfp import\
          \ kfp_lineage\n\n    ol_namespace = os.environ.get(\"OPENLINEAGE_NAMESPACE\"\
          , \"default\")\n    feast_project = ol_namespace.replace(\"-\", \"_\")\n\
          \    fs_yaml = os.path.join(feast_repo_path, \"feature_store.yaml\")\n \
          \   with open(fs_yaml, \"w\") as f:\n        f.write(f\"\"\"\\\nproject:\
          \ {feast_project}\nprovider: local\nregistry:\n  registry_type: sql\n  path:\
          \ postgresql://feast:feast@{pg_host}:5432/warehouse\n  cache_ttl_seconds:\
          \ 60\noffline_store:\n  type: postgres\n  host: {pg_host}\n  port: 5432\n\
          \  database: warehouse\n  db_schema: public\n  user: feast\n  password:\
          \ feast\nonline_store:\n  type: redis\n  connection_string: {redis_host}:6379\n\
          entity_key_serialization_version: 2\nopenlineage:\n  enabled: true\n  transport_type:\
          \ http\n  transport_url: http://marquez\n  emit_on_apply: true\n  emit_on_materialize:\
          \ true\n\"\"\")\n\n    pg_ns = f\"postgres://{pg_host}:5432\"\n\n    with\
          \ kfp_lineage(\n        \"kfp-feast_materialize\",\n        inputs=[{\"\
          namespace\": pg_ns, \"name\": \"warehouse.customer_features\"}],\n     \
          \   outputs=[{\"namespace\": feast_project, \"name\": \"online_store_customer_features_view\"\
          }],\n        url=\"http://marquez\",\n    ):\n        store = FeatureStore(repo_path=feast_repo_path)\n\
          \        end = datetime.utcnow()\n        start = end - timedelta(days=1000)\n\
          \        print(f\"Materializing features {start.isoformat()} -> {end.isoformat()}\"\
          )\n        store.materialize(start_date=start, end_date=end)\n        print(\"\
          Platform: feast materialize succeeded\")\n    return \"materialized\"\n\n"
        env:
        - name: OPENLINEAGE_PARENT_JOB_NAME
          value: full-ml-rag-pipeline
        image: image-registry.openshift-image-registry.svc:5000/lineage/fkm-app:latest
    exec-platform-spark-etl:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - platform_spark_etl
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef platform_spark_etl(\n    minio_endpoint: str,\n    pg_host: str,\n\
          \    pg_user: str,\n    pg_password: str,\n    pg_database: str,\n    warehouse_table:\
          \ str,\n    openlineage_url: str,\n    aws_access_key: str,\n    aws_secret_key:\
          \ str,\n) -> str:\n    \"\"\"PySpark ETL that reads CSV from MinIO, transforms,\
          \ writes to PostgreSQL.\n    The OpenLineage Spark listener emits lineage\
          \ events automatically.\n    OPENLINEAGE_NAMESPACE is injected by the Argo\
          \ workflow controller.\"\"\"\n    import os\n    import subprocess\n   \
          \ from openlineage_oai.adapters.kfp import kfp_lineage\n\n    os.environ[\"\
          MINIO_ENDPOINT\"] = minio_endpoint\n    os.environ[\"PG_HOST\"] = pg_host\n\
          \    os.environ[\"PG_USER\"] = pg_user\n    os.environ[\"PG_PASSWORD\"]\
          \ = pg_password\n    os.environ[\"PG_DATABASE\"] = pg_database\n    os.environ[\"\
          WAREHOUSE_TABLE\"] = warehouse_table\n    os.environ[\"OPENLINEAGE_URL\"\
          ] = openlineage_url\n    os.environ[\"AWS_ACCESS_KEY_ID\"] = aws_access_key\n\
          \    os.environ[\"AWS_SECRET_ACCESS_KEY\"] = aws_secret_key\n\n    with\
          \ kfp_lineage(\n        \"kfp-spark_etl\",\n        inputs=[{\"namespace\"\
          : \"s3://raw-data\", \"name\": \"customers.csv\"}],\n        outputs=[{\"\
          namespace\": f\"postgres://{pg_host}:5432\", \"name\": f\"{pg_database}.{warehouse_table}\"\
          }],\n        url=openlineage_url,\n    ):\n        result = subprocess.run(\n\
          \            [\"python3\", \"/opt/spark/spark_etl.py\"],\n            capture_output=True,\
          \ text=True,\n        )\n        print(result.stdout)\n        if result.returncode\
          \ != 0:\n            print(f\"STDERR: {result.stderr}\")\n            raise\
          \ RuntimeError(f\"Spark ETL failed: {result.stderr[:500]}\")\n        print(\"\
          Platform: spark ETL succeeded\")\n    return \"etl_done\"\n\n"
        env:
        - name: OPENLINEAGE_PARENT_JOB_NAME
          value: full-ml-rag-pipeline
        image: image-registry.openshift-image-registry.svc:5000/lineage/spark-etl:latest
    exec-store-in-milvus:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - store_in_milvus
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef store_in_milvus(\n    input_embeddings: dsl.Input[dsl.Dataset],\n\
          \    milvus_host: str,\n    milvus_port: int,\n    collection_name: str,\n\
          \    minio_endpoint: str,\n    openlineage_url: str,\n) -> str:\n    \"\"\
          \"Store embeddings in Milvus vector database and emit OpenLineage event.\"\
          \"\"\n    import json\n    import os\n    from datetime import datetime,\
          \ timezone\n    from uuid import uuid4\n    from pymilvus import (\n   \
          \     connections,\n        Collection,\n        CollectionSchema,\n   \
          \     FieldSchema,\n        DataType,\n        utility,\n    )\n    from\
          \ openlineage.client import OpenLineageClient\n    from openlineage.client.run\
          \ import RunEvent, RunState, Run, Job, Dataset\n    from openlineage.client.facet\
          \ import (\n        SchemaDatasetFacet,\n        SchemaField,\n        OutputStatisticsOutputDatasetFacet,\n\
          \    )\n\n    with open(input_embeddings.path) as f:\n        chunks = json.load(f)\n\
          \n    embedding_dim = len(chunks[0][\"embedding\"])\n\n    # Connect to\
          \ Milvus\n    print(f\"Connecting to Milvus at {milvus_host}:{milvus_port}\"\
          )\n    connections.connect(\n        alias=\"default\",\n        host=milvus_host,\n\
          \        port=milvus_port,\n    )\n\n    # Create collection if it doesn't\
          \ exist\n    if utility.has_collection(collection_name):\n        print(f\"\
          Collection '{collection_name}' already exists, dropping it...\")\n     \
          \   utility.drop_collection(collection_name)\n\n    # Define collection\
          \ schema\n    fields = [\n        FieldSchema(name=\"id\", dtype=DataType.INT64,\
          \ is_primary=True, auto_id=True),\n        FieldSchema(name=\"chunk_id\"\
          , dtype=DataType.INT64),\n        FieldSchema(name=\"source\", dtype=DataType.VARCHAR,\
          \ max_length=512),\n        FieldSchema(name=\"filename\", dtype=DataType.VARCHAR,\
          \ max_length=256),\n        FieldSchema(name=\"text\", dtype=DataType.VARCHAR,\
          \ max_length=65535),\n        FieldSchema(name=\"start_char\", dtype=DataType.INT64),\n\
          \        FieldSchema(name=\"end_char\", dtype=DataType.INT64),\n       \
          \ FieldSchema(name=\"embedding\", dtype=DataType.FLOAT_VECTOR, dim=embedding_dim),\n\
          \    ]\n\n    schema = CollectionSchema(\n        fields=fields,\n     \
          \   description=f\"RAG document chunks for {collection_name}\",\n    )\n\
          \n    print(f\"Creating collection '{collection_name}' with {embedding_dim}-dim\
          \ embeddings...\")\n    collection = Collection(\n        name=collection_name,\n\
          \        schema=schema,\n    )\n\n    # Prepare data for insertion\n   \
          \ data = [\n        [chunk[\"chunk_id\"] for chunk in chunks],  # chunk_id\n\
          \        [chunk[\"source\"] for chunk in chunks],  # source\n        [chunk[\"\
          filename\"] for chunk in chunks],  # filename\n        [chunk[\"text\"]\
          \ for chunk in chunks],  # text\n        [chunk[\"start_char\"] for chunk\
          \ in chunks],  # start_char\n        [chunk[\"end_char\"] for chunk in chunks],\
          \  # end_char\n        [chunk[\"embedding\"] for chunk in chunks],  # embedding\
          \ vectors\n    ]\n\n    # Insert data\n    print(f\"Inserting {len(chunks)}\
          \ chunks into Milvus...\")\n    collection.insert(data)\n\n    # Create\
          \ index for vector similarity search\n    print(\"Creating IVF_FLAT index\
          \ for similarity search...\")\n    index_params = {\n        \"metric_type\"\
          : \"COSINE\",\n        \"index_type\": \"IVF_FLAT\",\n        \"params\"\
          : {\"nlist\": 128},\n    }\n    collection.create_index(\n        field_name=\"\
          embedding\",\n        index_params=index_params,\n    )\n\n    # Load collection\
          \ into memory\n    collection.load()\n\n    # Get collection stats\n   \
          \ num_entities = collection.num_entities\n    print(f\"Stored {num_entities}\
          \ chunks in Milvus collection: {collection_name}\")\n\n    # Disconnect\
          \ from Milvus\n    connections.disconnect(\"default\")\n\n    # Get namespace\
          \ from environment (injected by Argo workflow controller)\n    namespace\
          \ = os.environ.get(\"OPENLINEAGE_NAMESPACE\", \"default\")\n\n    # Emit\
          \ OpenLineage event\n    ol_client = OpenLineageClient(url=openlineage_url)\n\
          \n    run_id = str(uuid4())\n    now = datetime.now(timezone.utc).isoformat()\n\
          \n    # Input: embeddings from previous step (stored in MinIO as KFP artifact)\n\
          \    input_dataset = Dataset(\n        namespace=f\"s3://{minio_endpoint}\"\
          ,\n        name=\"mlflow.artifacts.rag-ingestion.embeddings\",\n       \
          \ facets={},\n    )\n\n    # Create schema facet for Milvus collection\n\
          \    schema_fields = [\n        SchemaField(name=\"id\", type=\"INT64\"\
          , description=\"Auto-generated primary key\"),\n        SchemaField(name=\"\
          chunk_id\", type=\"INT64\", description=\"Chunk identifier\"),\n       \
          \ SchemaField(name=\"source\", type=\"VARCHAR(512)\", description=\"Source\
          \ document path\"),\n        SchemaField(name=\"filename\", type=\"VARCHAR(256)\"\
          , description=\"Source filename\"),\n        SchemaField(name=\"text\",\
          \ type=\"VARCHAR(65535)\", description=\"Chunk text content\"),\n      \
          \  SchemaField(name=\"start_char\", type=\"INT64\", description=\"Start\
          \ character position\"),\n        SchemaField(name=\"end_char\", type=\"\
          INT64\", description=\"End character position\"),\n        SchemaField(name=\"\
          embedding\", type=f\"FLOAT_VECTOR({embedding_dim})\", description=\"Vector\
          \ embedding\"),\n    ]\n\n    output_dataset = Dataset(\n        namespace=f\"\
          milvus://{milvus_host}:{milvus_port}\",\n        name=collection_name,\n\
          \        facets={\n            \"schema\": SchemaDatasetFacet(fields=schema_fields),\n\
          \            \"outputStatistics\": OutputStatisticsOutputDatasetFacet(\n\
          \                rowCount=num_entities,\n                size=sum(len(chunk[\"\
          text\"]) for chunk in chunks),\n            ),\n        },\n    )\n\n  \
          \  # Create the job\n    job = Job(\n        namespace=namespace,\n    \
          \    name=\"rag_store_milvus\",\n        facets={},\n    )\n\n    # Create\
          \ the run\n    run = Run(runId=run_id, facets={})\n\n    # Emit COMPLETE\
          \ event\n    event = RunEvent(\n        eventType=RunState.COMPLETE,\n \
          \       eventTime=now,\n        run=run,\n        job=job,\n        inputs=[input_dataset],\n\
          \        outputs=[output_dataset],\n        producer=\"rag-ingestion-pipeline/milvus\"\
          ,\n    )\n\n    ol_client.emit(event)\n    print(f\"OpenLineage event emitted:\
          \ {namespace}/rag_store_milvus (run: {run_id})\")\n\n    return json.dumps({\n\
          \        \"collection_name\": collection_name,\n        \"num_chunks\":\
          \ num_entities,\n        \"embedding_dim\": embedding_dim,\n        \"index_type\"\
          : \"IVF_FLAT\",\n        \"metric_type\": \"COSINE\",\n        \"openlineage_run_id\"\
          : run_id,\n    })\n\n"
        env:
        - name: OPENLINEAGE_PARENT_JOB_NAME
          value: full-ml-rag-pipeline
        image: image-registry.openshift-image-registry.svc:5000/lineage/rag-app:latest
    exec-test-inference:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - test_inference
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef test_inference(\n    inference_url: str,\n    milvus_host: str,\n\
          \    milvus_port: int,\n    milvus_collection: str,\n    openlineage_url:\
          \ str,\n    store_done: str,\n) -> str:\n    \"\"\"Call the RAG inference\
          \ service and emit OL event linking both pipelines.\"\"\"\n    import json\n\
          \    import os\n    from datetime import datetime, timezone\n    from uuid\
          \ import uuid4\n    import requests\n    from openlineage.client import\
          \ OpenLineageClient\n    from openlineage.client.run import RunEvent, RunState,\
          \ Run, Job, Dataset\n    from openlineage.client.facet import SchemaDatasetFacet,\
          \ SchemaField\n\n    namespace = os.environ.get(\"OPENLINEAGE_NAMESPACE\"\
          , \"default\")\n    feast_project = namespace.replace(\"-\", \"_\")\n\n\
          \    # Call inference service\n    query = \"What are the best practices\
          \ for feature engineering in MLOps?\"\n    print(f\"Calling inference service\
          \ at {inference_url}\")\n    try:\n        resp = requests.post(\n     \
          \       f\"{inference_url}/query\",\n            json={\"query\": query,\
          \ \"top_k\": 3},\n            timeout=30,\n        )\n        resp.raise_for_status()\n\
          \        result = resp.json()\n        print(f\"Inference response: {json.dumps(result,\
          \ indent=2)[:500]}\")\n    except Exception as e:\n        print(f\"Inference\
          \ call failed (non-fatal): {e}\")\n        result = {\"error\": str(e),\
          \ \"query\": query}\n\n    # Emit OpenLineage event showing inference consumes\
          \ both pipelines' outputs\n    ol_client = OpenLineageClient(url=openlineage_url)\n\
          \    run_id = str(uuid4())\n\n    milvus_input = Dataset(\n        namespace=f\"\
          milvus://{milvus_host}:{milvus_port}\",\n        name=milvus_collection,\n\
          \        facets={},\n    )\n\n    feast_input = Dataset(\n        namespace=feast_project,\n\
          \        name=\"online_store_customer_features_view\",\n        facets={},\n\
          \    )\n\n    output_dataset = Dataset(\n        namespace=namespace,\n\
          \        name=\"rag_inference_result\",\n        facets={\n            \"\
          schema\": SchemaDatasetFacet(\n                fields=[\n              \
          \      SchemaField(name=\"query\", type=\"STRING\"),\n                 \
          \   SchemaField(name=\"response\", type=\"STRING\"),\n                 \
          \   SchemaField(name=\"sources\", type=\"ARRAY<STRING>\"),\n           \
          \     ]\n            ),\n        },\n    )\n\n    event = RunEvent(\n  \
          \      eventType=RunState.COMPLETE,\n        eventTime=datetime.now(timezone.utc).isoformat(),\n\
          \        run=Run(runId=run_id, facets={}),\n        job=Job(namespace=namespace,\
          \ name=\"rag_inference\", facets={}),\n        inputs=[milvus_input, feast_input],\n\
          \        outputs=[output_dataset],\n        producer=\"rag-inference-pipeline/test\"\
          ,\n    )\n    ol_client.emit(event)\n    print(f\"OpenLineage event emitted:\
          \ {namespace}/rag_inference\")\n\n    return json.dumps(result)\n\n"
        env:
        - name: OPENLINEAGE_PARENT_JOB_NAME
          value: full-ml-rag-pipeline
        image: image-registry.openshift-image-registry.svc:5000/lineage/fkm-app:latest
pipelineInfo:
  description: 'Combined pipeline: Customer Churn ML (Spark ETL, Feast, XGBoost/MLflow)
    followed by RAG document ingestion (load, chunk, embed, Milvus). All steps emit
    OpenLineage events.'
  name: full-ml-rag-pipeline
root:
  dag:
    tasks:
      chunk-documents:
        cachingOptions: {}
        componentRef:
          name: comp-chunk-documents
        dependentTasks:
        - load-documents
        inputs:
          artifacts:
            input_docs:
              taskOutputArtifact:
                outputArtifactKey: output_docs
                producerTask: load-documents
          parameters:
            chunk_overlap:
              componentInputParameter: rag_chunk_overlap
            chunk_size:
              componentInputParameter: rag_chunk_size
            minio_endpoint:
              runtimeValue:
                constant: mlflow-minio:9000
            openlineage_url:
              runtimeValue:
                constant: http://marquez
        taskInfo:
          name: chunk-documents
      ds-data-extraction:
        cachingOptions: {}
        componentRef:
          name: comp-ds-data-extraction
        dependentTasks:
        - platform-feast-materialize
        inputs:
          parameters:
            feast_repo_path:
              componentInputParameter: feast_repo_path
            materialize_done:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: platform-feast-materialize
            pg_host:
              componentInputParameter: pg_host
            pg_url:
              componentInputParameter: pg_url
            redis_host:
              componentInputParameter: redis_host
            table_name:
              componentInputParameter: table_name
        taskInfo:
          name: ds-data-extraction
      ds-evaluation:
        cachingOptions: {}
        componentRef:
          name: comp-ds-evaluation
        dependentTasks:
        - ds-model-training
        inputs:
          parameters:
            train_result_json:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: ds-model-training
        taskInfo:
          name: ds-evaluation
      ds-feature-engineering:
        cachingOptions: {}
        componentRef:
          name: comp-ds-feature-engineering
        dependentTasks:
        - ds-data-extraction
        inputs:
          artifacts:
            dataset:
              taskOutputArtifact:
                outputArtifactKey: output_path
                producerTask: ds-data-extraction
        taskInfo:
          name: ds-feature-engineering
      ds-model-registration:
        cachingOptions: {}
        componentRef:
          name: comp-ds-model-registration
        dependentTasks:
        - ds-evaluation
        - ds-model-training
        inputs:
          parameters:
            aws_key:
              componentInputParameter: aws_key
            aws_secret:
              componentInputParameter: aws_secret
            metrics_json:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: ds-evaluation
            model_name:
              componentInputParameter: model_name
            roc_auc_threshold:
              componentInputParameter: roc_auc_threshold
            s3_endpoint:
              componentInputParameter: s3_endpoint
            tracking_uri:
              componentInputParameter: tracking_uri
            train_result_json:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: ds-model-training
        taskInfo:
          name: ds-model-registration
      ds-model-training:
        cachingOptions: {}
        componentRef:
          name: comp-ds-model-training
        dependentTasks:
        - ds-feature-engineering
        inputs:
          artifacts:
            dataset:
              taskOutputArtifact:
                outputArtifactKey: output_path
                producerTask: ds-feature-engineering
          parameters:
            aws_key:
              componentInputParameter: aws_key
            aws_secret:
              componentInputParameter: aws_secret
            experiment_name:
              componentInputParameter: experiment_name
            s3_endpoint:
              componentInputParameter: s3_endpoint
            tracking_uri:
              componentInputParameter: tracking_uri
        taskInfo:
          name: ds-model-training
      generate-embeddings:
        cachingOptions: {}
        componentRef:
          name: comp-generate-embeddings
        dependentTasks:
        - chunk-documents
        inputs:
          artifacts:
            input_chunks:
              taskOutputArtifact:
                outputArtifactKey: output_chunks
                producerTask: chunk-documents
          parameters:
            minio_endpoint:
              runtimeValue:
                constant: mlflow-minio:9000
            model_name:
              componentInputParameter: rag_embedding_model
            openlineage_url:
              runtimeValue:
                constant: http://marquez
        taskInfo:
          name: generate-embeddings
      load-documents:
        cachingOptions: {}
        componentRef:
          name: comp-load-documents
        dependentTasks:
        - ds-model-registration
        inputs:
          parameters:
            aws_key:
              componentInputParameter: aws_key
            aws_secret:
              componentInputParameter: aws_secret
            bucket_name:
              componentInputParameter: rag_bucket_name
            minio_endpoint:
              runtimeValue:
                constant: mlflow-minio:9000
            openlineage_url:
              runtimeValue:
                constant: http://marquez
            prefix:
              componentInputParameter: rag_document_prefix
        taskInfo:
          name: load-documents
      platform-feast-apply:
        cachingOptions: {}
        componentRef:
          name: comp-platform-feast-apply
        dependentTasks:
        - platform-spark-etl
        inputs:
          parameters:
            feast_repo_path:
              componentInputParameter: feast_repo_path
            pg_host:
              componentInputParameter: pg_host
            redis_host:
              componentInputParameter: redis_host
        taskInfo:
          name: platform-feast-apply
      platform-feast-materialize:
        cachingOptions: {}
        componentRef:
          name: comp-platform-feast-materialize
        dependentTasks:
        - platform-feast-apply
        inputs:
          parameters:
            apply_done:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: platform-feast-apply
            feast_repo_path:
              componentInputParameter: feast_repo_path
            pg_host:
              componentInputParameter: pg_host
            redis_host:
              componentInputParameter: redis_host
        taskInfo:
          name: platform-feast-materialize
      platform-spark-etl:
        cachingOptions: {}
        componentRef:
          name: comp-platform-spark-etl
        inputs:
          parameters:
            aws_access_key:
              componentInputParameter: aws_key
