# PIPELINE DEFINITION
# Name: customer-churn-ml-pipeline
# Description: End-to-end churn prediction pipeline. PLATFORM steps: Spark ETL, Feast apply & materialize (managed by infra). DS steps: data extraction, validation, feature engineering, XGBoost training, evaluation, MLflow registration (owned by data scientists).
# Inputs:
#    aws_key: str [Default: 'minioadmin']
#    aws_secret: str [Default: 'minioadmin123']
#    experiment_name: str [Default: 'customer_churn_lineage']
#    feast_repo_path: str [Default: '/app/src/feature_store']
#    model_name: str [Default: 'customer_churn_model']
#    pg_host: str [Default: 'postgres']
#    pg_url: str [Default: 'postgresql://feast:feast@postgres:5432/warehouse']
#    redis_host: str [Default: 'redis']
#    roc_auc_threshold: float [Default: 0.7]
#    s3_endpoint: str [Default: 'http://mlflow-minio:9000']
#    table_name: str [Default: 'customer_features']
#    tracking_uri: str [Default: 'openlineage+http://mlflow-server:5000']
components:
  comp-ds-data-extraction:
    executorLabel: exec-ds-data-extraction
    inputDefinitions:
      parameters:
        feast_repo_path:
          parameterType: STRING
        materialize_done:
          parameterType: STRING
        pg_host:
          parameterType: STRING
        pg_url:
          parameterType: STRING
        redis_host:
          parameterType: STRING
        table_name:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        output_path:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-ds-data-validation:
    executorLabel: exec-ds-data-validation
    inputDefinitions:
      artifacts:
        dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        openlineage_namespace:
          parameterType: STRING
        openlineage_url:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        output_path:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-ds-evaluation:
    executorLabel: exec-ds-evaluation
    inputDefinitions:
      parameters:
        train_result_json:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-ds-feature-engineering:
    executorLabel: exec-ds-feature-engineering
    inputDefinitions:
      artifacts:
        dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
    outputDefinitions:
      artifacts:
        output_path:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-ds-model-registration:
    executorLabel: exec-ds-model-registration
    inputDefinitions:
      parameters:
        aws_key:
          parameterType: STRING
        aws_secret:
          parameterType: STRING
        metrics_json:
          parameterType: STRING
        model_name:
          parameterType: STRING
        roc_auc_threshold:
          parameterType: NUMBER_DOUBLE
        s3_endpoint:
          parameterType: STRING
        tracking_uri:
          parameterType: STRING
        train_result_json:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-ds-model-training:
    executorLabel: exec-ds-model-training
    inputDefinitions:
      artifacts:
        dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        aws_key:
          parameterType: STRING
        aws_secret:
          parameterType: STRING
        experiment_name:
          parameterType: STRING
        s3_endpoint:
          parameterType: STRING
        tracking_uri:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-platform-feast-apply:
    executorLabel: exec-platform-feast-apply
    inputDefinitions:
      parameters:
        feast_repo_path:
          parameterType: STRING
        pg_host:
          parameterType: STRING
        redis_host:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-platform-feast-materialize:
    executorLabel: exec-platform-feast-materialize
    inputDefinitions:
      parameters:
        apply_done:
          parameterType: STRING
        feast_repo_path:
          parameterType: STRING
        pg_host:
          parameterType: STRING
        redis_host:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-platform-spark-etl:
    executorLabel: exec-platform-spark-etl
    inputDefinitions:
      parameters:
        aws_access_key:
          parameterType: STRING
        aws_secret_key:
          parameterType: STRING
        minio_endpoint:
          parameterType: STRING
        openlineage_namespace:
          parameterType: STRING
        openlineage_url:
          parameterType: STRING
        pg_database:
          parameterType: STRING
        pg_host:
          parameterType: STRING
        pg_password:
          parameterType: STRING
        pg_user:
          parameterType: STRING
        warehouse_table:
          parameterType: STRING
    outputDefinitions:
