# PIPELINE DEFINITION
# Name: customer-churn-ml-pipeline
# Description: End-to-end churn prediction pipeline. PLATFORM steps: Spark ETL, Feast apply & materialize (managed by infra). DS steps: data extraction, validation, feature engineering, XGBoost training, evaluation, MLflow registration (owned by data scientists). OPENLINEAGE_NAMESPACE is injected by the Argo workflow controller.
# Inputs:
#    aws_key: str [Default: 'minioadmin']
#    aws_secret: str [Default: 'minioadmin123']
#    experiment_name: str [Default: 'customer_churn_lineage']
#    feast_repo_path: str [Default: '/app/src/feature_store']
#    model_name: str [Default: 'customer_churn_model']
#    pg_host: str [Default: 'postgres']
#    pg_url: str [Default: 'postgresql://feast:feast@postgres:5432/warehouse']
#    redis_host: str [Default: 'redis']
#    roc_auc_threshold: float [Default: 0.7]
#    s3_endpoint: str [Default: 'http://mlflow-minio:9000']
#    table_name: str [Default: 'customer_features']
#    tracking_uri: str [Default: 'openlineage+http://mlflow-server:5000']
components:
  comp-ds-data-extraction:
    executorLabel: exec-ds-data-extraction
    inputDefinitions:
      parameters:
        feast_repo_path:
          parameterType: STRING
        materialize_done:
          parameterType: STRING
        pg_host:
          parameterType: STRING
        pg_url:
          parameterType: STRING
        redis_host:
          parameterType: STRING
        table_name:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        output_path:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-ds-data-validation:
    executorLabel: exec-ds-data-validation
    inputDefinitions:
      artifacts:
        dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        openlineage_namespace:
          parameterType: STRING
        openlineage_url:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        output_path:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-ds-evaluation:
    executorLabel: exec-ds-evaluation
    inputDefinitions:
      parameters:
        tracking_uri:
          parameterType: STRING
        train_result_json:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-ds-feature-engineering:
    executorLabel: exec-ds-feature-engineering
    inputDefinitions:
      artifacts:
        dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
    outputDefinitions:
      artifacts:
        output_path:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-ds-model-registration:
    executorLabel: exec-ds-model-registration
    inputDefinitions:
      parameters:
        aws_key:
          parameterType: STRING
        aws_secret:
          parameterType: STRING
        metrics_json:
          parameterType: STRING
        model_name:
          parameterType: STRING
        roc_auc_threshold:
          parameterType: NUMBER_DOUBLE
        s3_endpoint:
          parameterType: STRING
        tracking_uri:
          parameterType: STRING
        train_result_json:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-ds-model-training:
    executorLabel: exec-ds-model-training
    inputDefinitions:
      artifacts:
        dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        aws_key:
          parameterType: STRING
        aws_secret:
          parameterType: STRING
        experiment_name:
          parameterType: STRING
        s3_endpoint:
          parameterType: STRING
        tracking_uri:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-platform-feast-apply:
    executorLabel: exec-platform-feast-apply
    inputDefinitions:
      parameters:
        feast_repo_path:
          parameterType: STRING
        pg_host:
          parameterType: STRING
        redis_host:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-platform-feast-materialize:
    executorLabel: exec-platform-feast-materialize
    inputDefinitions:
      parameters:
        apply_done:
          parameterType: STRING
        feast_repo_path:
          parameterType: STRING
        pg_host:
          parameterType: STRING
        redis_host:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-platform-spark-etl:
    executorLabel: exec-platform-spark-etl
    inputDefinitions:
      parameters:
        aws_access_key:
          parameterType: STRING
        aws_secret_key:
          parameterType: STRING
        minio_endpoint:
          parameterType: STRING
        openlineage_url:
          parameterType: STRING
        pg_database:
          parameterType: STRING
        pg_host:
          parameterType: STRING
        pg_password:
          parameterType: STRING
        pg_user:
          parameterType: STRING
        warehouse_table:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-ds-data-extraction:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - ds_data_extraction
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef ds_data_extraction(\n    pg_url: str,\n    feast_repo_path: str,\n\
          \    table_name: str,\n    pg_host: str,\n    redis_host: str,\n    materialize_done:\
          \ str,\n    output_path: dsl.Output[dsl.Dataset],\n) -> None:\n    \"\"\"\
          Retrieve historical features from Feast and save as parquet.\"\"\"\n   \
          \ import os\n\n    import pandas as pd\n    from openlineage_oai.adapters.kfp\
          \ import kfp_lineage, kfp_output_with_schema\n\n    from src.pipeline import\
          \ components\n\n    _ = materialize_done  # KFP dependency edge only\n\n\
          \    ol_namespace = os.environ.get(\"OPENLINEAGE_NAMESPACE\", \"default\"\
          )\n    print(f\"DS: data extraction  pg={pg_host} redis={redis_host} ol_ns={ol_namespace}\"\
          )\n\n    with kfp_lineage(\n        \"kfp-data_extraction\",\n        inputs=[{\"\
          namespace\": f\"postgres://{pg_host}:5432\", \"name\": \"warehouse.customer_features_view\"\
          }],\n        outputs=[],\n        url=\"http://marquez\",\n    ) as run:\n\
          \        result = components.data_extraction_for_kfp(\n            pg_url,\
          \ feast_repo_path, table_name, pg_host, redis_host,\n        )\n       \
          \ print(f\"DS: data extraction complete - shape {result.shape}\")\n    \
          \    result.to_parquet(output_path.path)\n        run.add_output(kfp_output_with_schema(output_path,\
          \ result))\n\n"
        env:
        - name: OPENLINEAGE_PARENT_JOB_NAME
          value: customer-churn-ml-pipeline
        image: image-registry.openshift-image-registry.svc:5000/fkm/fkm-app:latest
    exec-ds-data-validation:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - ds_data_validation
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef ds_data_validation(\n    dataset: dsl.Input[dsl.Dataset],\n \
          \   openlineage_url: str,\n    openlineage_namespace: str,\n    output_path:\
          \ dsl.Output[dsl.Dataset],\n) -> None:\n    \"\"\"Validate data quality\
          \ with Great Expectations, emitting OpenLineage events.\"\"\"\n    import\
          \ pandas as pd\n\n    from src.pipeline.gx_churn_validation import validate_churn_dataset_with_gx\n\
          \n    df = pd.read_parquet(dataset.path)\n    df = validate_churn_dataset_with_gx(df,\
          \ openlineage_url, openlineage_namespace)\n    df.to_parquet(output_path.path)\n\
          \n"
        env:
        - name: OPENLINEAGE_PARENT_JOB_NAME
          value: customer-churn-ml-pipeline
        image: image-registry.openshift-image-registry.svc:5000/fkm/fkm-app:latest
    exec-ds-evaluation:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - ds_evaluation
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef ds_evaluation(train_result_json: str, tracking_uri: str) -> str:\n\
          \    \"\"\"Display and return evaluation metrics.\"\"\"\n    import json\n\
          \    import os\n\n    from openlineage_oai.adapters.kfp import kfp_lineage\n\
          \n    from src.pipeline import components\n\n    ol_namespace = os.environ.get(\"\
          OPENLINEAGE_NAMESPACE\", \"default\")\n\n    with kfp_lineage(\n       \
          \ \"kfp-evaluation\",\n        inputs=[{\"namespace\": ol_namespace, \"\
          name\": \"model.model\"}],\n        outputs=[],\n        url=\"http://marquez\"\
          ,\n    ):\n        result = json.loads(train_result_json)\n        m = components.evaluation(result,\
          \ tracking_uri=tracking_uri)\n        return json.dumps({k: float(v) for\
          \ k, v in m.items()})\n\n"
        env:
        - name: OPENLINEAGE_PARENT_JOB_NAME
          value: customer-churn-ml-pipeline
        image: image-registry.openshift-image-registry.svc:5000/fkm/fkm-app:latest
    exec-ds-feature-engineering:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - ds_feature_engineering
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef ds_feature_engineering(\n    dataset: dsl.Input[dsl.Dataset],\n\
          \    output_path: dsl.Output[dsl.Dataset],\n) -> None:\n    \"\"\"Add derived\
          \ features.\"\"\"\n    import pandas as pd\n    from openlineage_oai.adapters.kfp\
          \ import kfp_lineage, kfp_output_with_schema\n\n    from src.pipeline import\
          \ components\n\n    with kfp_lineage(\n        \"kfp-feature_engineering\"\
          ,\n        inputs=[dataset],\n        outputs=[],\n        url=\"http://marquez\"\
          ,\n    ) as run:\n        df = pd.read_parquet(dataset.path)\n        df\
          \ = components.feature_engineering(df)\n        print(f\"DS: feature engineering\
          \ complete - shape {df.shape}\")\n        df.to_parquet(output_path.path)\n\
          \        run.add_output(kfp_output_with_schema(output_path, df))\n\n"
        env:
        - name: OPENLINEAGE_PARENT_JOB_NAME
          value: customer-churn-ml-pipeline
        image: image-registry.openshift-image-registry.svc:5000/fkm/fkm-app:latest
    exec-ds-model-registration:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - ds_model_registration
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef ds_model_registration(\n    train_result_json: str,\n    metrics_json:\
          \ str,\n    model_name: str,\n    tracking_uri: str,\n    s3_endpoint: str,\n\
          \    aws_key: str,\n    aws_secret: str,\n    roc_auc_threshold: float,\n\
          ) -> str:\n    \"\"\"Register model in MLflow if metrics beat the threshold.\"\
          \"\"\n    import json\n    import os\n\n    from openlineage_oai.adapters.kfp\
          \ import kfp_lineage\n\n    from src.pipeline import components\n\n    os.environ[\"\
          MLFLOW_S3_ENDPOINT_URL\"] = s3_endpoint\n    os.environ[\"AWS_ACCESS_KEY_ID\"\
          ] = aws_key\n    os.environ[\"AWS_SECRET_ACCESS_KEY\"] = aws_secret\n  \
          \  plain_uri = tracking_uri.replace(\"openlineage+\", \"\")\n    os.environ[\"\
          MLFLOW_REGISTRY_URI\"] = plain_uri\n\n    ol_namespace = os.environ.get(\"\
          OPENLINEAGE_NAMESPACE\", \"default\")\n\n    with kfp_lineage(\n       \
          \ \"kfp-model_registration\",\n        inputs=[{\"namespace\": ol_namespace,\
          \ \"name\": \"model.model\"}],\n        outputs=[{\"namespace\": \"mlflow\"\
          , \"name\": f\"models.{model_name}\"}],\n        url=\"http://marquez\"\
          ,\n    ):\n        train_result = json.loads(train_result_json)\n      \
          \  metrics = json.loads(metrics_json)\n        d = components.model_registration(\n\
          \            train_result, metrics, model_name, tracking_uri, roc_auc_threshold,\n\
          \        )\n        return json.dumps(d)\n\n"
        env:
        - name: OPENLINEAGE_PARENT_JOB_NAME
          value: customer-churn-ml-pipeline
        image: image-registry.openshift-image-registry.svc:5000/fkm/fkm-app:latest
    exec-ds-model-training:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - ds_model_training
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef ds_model_training(\n    dataset: dsl.Input[dsl.Dataset],\n  \
          \  tracking_uri: str,\n    experiment_name: str,\n    s3_endpoint: str,\n\
          \    aws_key: str,\n    aws_secret: str,\n) -> str:\n    \"\"\"Train XGBoost,\
          \ log to MLflow. Returns JSON with run_id, model_uri, metrics.\"\"\"\n \
          \   import json\n    import os\n\n    import pandas as pd\n    from openlineage_oai.adapters.kfp\
          \ import kfp_lineage\n\n    from src.pipeline import components\n\n    ol_namespace\
          \ = os.environ.get(\"OPENLINEAGE_NAMESPACE\", \"default\")\n\n    os.environ[\"\
          MLFLOW_S3_ENDPOINT_URL\"] = s3_endpoint\n    os.environ[\"AWS_ACCESS_KEY_ID\"\
          ] = aws_key\n    os.environ[\"AWS_SECRET_ACCESS_KEY\"] = aws_secret\n  \
          \  os.environ[\"OPENLINEAGE_URL\"] = \"http://marquez\"\n    os.environ[\"\
          DATASET_SOURCE_URI\"] = dataset.uri\n\n    with kfp_lineage(\n        \"\
          kfp-model_training\",\n        inputs=[dataset],\n        outputs=[{\"namespace\"\
          : ol_namespace, \"name\": \"model.model\"}],\n        url=\"http://marquez\"\
          ,\n    ):\n        df = pd.read_parquet(dataset.path)\n        out = components.model_training(df,\
          \ tracking_uri, experiment_name, params=None)\n        metrics = {k: float(v)\
          \ for k, v in out[\"metrics\"].items()}\n        print(f\"DS: model training\
          \ complete - metrics: {metrics}\")\n        return json.dumps({\n      \
          \      \"run_id\": out[\"run_id\"],\n            \"model_uri\": out[\"model_uri\"\
          ],\n            \"metrics\": metrics,\n        })\n\n"
        env:
        - name: OPENLINEAGE_PARENT_JOB_NAME
          value: customer-churn-ml-pipeline
        image: image-registry.openshift-image-registry.svc:5000/fkm/fkm-app:latest
    exec-platform-feast-apply:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - platform_feast_apply
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef platform_feast_apply(\n    feast_repo_path: str,\n    pg_host:\
          \ str,\n    redis_host: str,\n) -> str:\n    \"\"\"Run feast apply to register\
          \ feature definitions. Emits OpenLineage events.\"\"\"\n    import os\n\
          \    import subprocess\n\n    from openlineage_oai.adapters.kfp import kfp_lineage\n\
          \    from src.pipeline.feast_runtime_yaml import write_feast_feature_store_yaml\n\
          \n    ol_namespace = os.environ.get(\"OPENLINEAGE_NAMESPACE\", \"default\"\
          )\n    feast_project = ol_namespace.replace(\"-\", \"_\")\n    fs_yaml =\
          \ write_feast_feature_store_yaml(\n        feast_repo_path,\n        feast_project=feast_project,\n\
          \        pg_host=pg_host,\n        redis_host=redis_host,\n    )\n    print(f\"\
          Patched {fs_yaml} -> ol_ns={ol_namespace}\")\n\n    pg_ns = f\"postgres://{pg_host}:5432\"\
          \n\n    feast_ns = ol_namespace.replace(\"-\", \"_\")\n\n    with kfp_lineage(\n\
          \        \"kfp-feast_apply\",\n        inputs=[{\"namespace\": pg_ns, \"\
          name\": \"warehouse.customer_features\"}],\n        outputs=[\n        \
          \    {\"namespace\": pg_ns, \"name\": \"warehouse.customer_features_view\"\
          },\n        ],\n        url=\"http://marquez\",\n    ):\n        env = os.environ.copy()\n\
          \        env[\"REDIS_PORT\"] = \"6379\"\n        result = subprocess.run(\n\
          \            [\"feast\", \"apply\"],\n            cwd=feast_repo_path,\n\
          \            capture_output=True, text=True,\n            env=env,\n   \
          \     )\n        print(result.stdout)\n        if result.returncode != 0:\n\
          \            print(f\"STDERR: {result.stderr}\")\n            raise RuntimeError(f\"\
          feast apply failed: {result.stderr[:500]}\")\n        print(\"Platform:\
          \ feast apply succeeded\")\n    return \"applied\"\n\n"
        env:
        - name: OPENLINEAGE_PARENT_JOB_NAME
          value: customer-churn-ml-pipeline
        image: image-registry.openshift-image-registry.svc:5000/fkm/fkm-app:latest
    exec-platform-feast-materialize:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - platform_feast_materialize
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef platform_feast_materialize(\n    feast_repo_path: str,\n    pg_host:\
          \ str,\n    redis_host: str,\n    apply_done: str,\n) -> str:\n    \"\"\"\
          Materialize features from offline to online store. Emits OpenLineage events.\"\
          \"\"\n    import os\n    from datetime import datetime, timedelta\n\n  \
          \  from feast import FeatureStore\n    from openlineage_oai.adapters.kfp\
          \ import kfp_lineage\n    from src.pipeline.feast_runtime_yaml import write_feast_feature_store_yaml\n\
          \n    ol_namespace = os.environ.get(\"OPENLINEAGE_NAMESPACE\", \"default\"\
          )\n    feast_project = ol_namespace.replace(\"-\", \"_\")\n    write_feast_feature_store_yaml(\n\
          \        feast_repo_path,\n        feast_project=feast_project,\n      \
          \  pg_host=pg_host,\n        redis_host=redis_host,\n    )\n\n    pg_ns\
          \ = f\"postgres://{pg_host}:5432\"\n\n    with kfp_lineage(\n        \"\
          kfp-feast_materialize\",\n        inputs=[{\"namespace\": pg_ns, \"name\"\
          : \"warehouse.customer_features\"}],\n        outputs=[{\"namespace\": feast_project,\
          \ \"name\": \"online_store_customer_features_view\"}],\n        url=\"http://marquez\"\
          ,\n    ):\n        store = FeatureStore(repo_path=feast_repo_path)\n   \
          \     end = datetime.utcnow()\n        start = end - timedelta(days=1000)\n\
          \        print(f\"Materializing features {start.isoformat()} -> {end.isoformat()}\"\
          )\n        store.materialize(start_date=start, end_date=end)\n        print(\"\
          Platform: feast materialize succeeded\")\n    return \"materialized\"\n\n"
        env:
        - name: OPENLINEAGE_PARENT_JOB_NAME
          value: customer-churn-ml-pipeline
        image: image-registry.openshift-image-registry.svc:5000/fkm/fkm-app:latest
    exec-platform-spark-etl:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - platform_spark_etl
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef platform_spark_etl(\n    minio_endpoint: str,\n    pg_host: str,\n\
          \    pg_user: str,\n    pg_password: str,\n    pg_database: str,\n    warehouse_table:\
          \ str,\n    openlineage_url: str,\n    aws_access_key: str,\n    aws_secret_key:\
          \ str,\n) -> str:\n    \"\"\"PySpark ETL that reads CSV from MinIO, transforms,\
          \ writes to PostgreSQL.\n    The OpenLineage Spark listener emits lineage\
          \ events automatically.\n    OPENLINEAGE_NAMESPACE is injected by the Argo\
          \ workflow controller.\"\"\"\n    import os\n    import subprocess\n   \
          \ from openlineage_oai.adapters.kfp import kfp_lineage\n\n    os.environ[\"\
          MINIO_ENDPOINT\"] = minio_endpoint\n    os.environ[\"PG_HOST\"] = pg_host\n\
          \    os.environ[\"PG_USER\"] = pg_user\n    os.environ[\"PG_PASSWORD\"]\
          \ = pg_password\n    os.environ[\"PG_DATABASE\"] = pg_database\n    os.environ[\"\
          WAREHOUSE_TABLE\"] = warehouse_table\n    os.environ[\"OPENLINEAGE_URL\"\
          ] = openlineage_url\n    os.environ[\"AWS_ACCESS_KEY_ID\"] = aws_access_key\n\
          \    os.environ[\"AWS_SECRET_ACCESS_KEY\"] = aws_secret_key\n\n    with\
          \ kfp_lineage(\n        \"kfp-spark_etl\",\n        inputs=[{\"namespace\"\
          : \"s3://raw-data\", \"name\": \"customers.csv\"}],\n        outputs=[{\"\
          namespace\": f\"postgres://{pg_host}:5432\", \"name\": f\"{pg_database}.{warehouse_table}\"\
          }],\n        url=openlineage_url,\n    ):\n        result = subprocess.run(\n\
          \            [\"python3\", \"/opt/spark/spark_etl.py\"],\n            capture_output=True,\
          \ text=True,\n        )\n        print(result.stdout)\n        if result.returncode\
          \ != 0:\n            print(f\"STDERR: {result.stderr}\")\n            raise\
          \ RuntimeError(f\"Spark ETL failed: {result.stderr[:500]}\")\n        print(\"\
          Platform: spark ETL succeeded\")\n    return \"etl_done\"\n\n"
        env:
        - name: OPENLINEAGE_PARENT_JOB_NAME
          value: customer-churn-ml-pipeline
        image: image-registry.openshift-image-registry.svc:5000/fkm/spark-etl:latest
pipelineInfo:
  description: 'End-to-end churn prediction pipeline. PLATFORM steps: Spark ETL, Feast
    apply & materialize (managed by infra). DS steps: data extraction, validation,
    feature engineering, XGBoost training, evaluation, MLflow registration (owned
    by data scientists). OPENLINEAGE_NAMESPACE is injected by the Argo workflow controller.'
  name: customer-churn-ml-pipeline
root:
  dag:
    tasks:
      ds-data-extraction:
        cachingOptions: {}
        componentRef:
          name: comp-ds-data-extraction
        dependentTasks:
        - platform-feast-materialize
        inputs:
          parameters:
            feast_repo_path:
              componentInputParameter: feast_repo_path
            materialize_done:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: platform-feast-materialize
            pg_host:
              componentInputParameter: pg_host
            pg_url:
              componentInputParameter: pg_url
            redis_host:
              componentInputParameter: redis_host
            table_name:
              componentInputParameter: table_name
        taskInfo:
          name: ds-data-extraction
      ds-data-validation:
        cachingOptions: {}
        componentRef:
          name: comp-ds-data-validation
        dependentTasks:
        - ds-data-extraction
        inputs:
          artifacts:
            dataset:
              taskOutputArtifact:
                outputArtifactKey: output_path
                producerTask: ds-data-extraction
          parameters:
            openlineage_namespace:
              runtimeValue:
                constant: ''
            openlineage_url:
              runtimeValue:
                constant: http://marquez
        taskInfo:
          name: ds-data-validation
      ds-evaluation:
        cachingOptions: {}
        componentRef:
          name: comp-ds-evaluation
        dependentTasks:
        - ds-model-training
        inputs:
          parameters:
            tracking_uri:
              componentInputParameter: tracking_uri
            train_result_json:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: ds-model-training
        taskInfo:
          name: ds-evaluation
      ds-feature-engineering:
        cachingOptions: {}
        componentRef:
          name: comp-ds-feature-engineering
        dependentTasks:
        - ds-data-validation
        inputs:
          artifacts:
            dataset:
              taskOutputArtifact:
                outputArtifactKey: output_path
                producerTask: ds-data-validation
        taskInfo:
          name: ds-feature-engineering
      ds-model-registration:
        cachingOptions: {}
        componentRef:
          name: comp-ds-model-registration
        dependentTasks:
        - ds-evaluation
        - ds-model-training
        inputs:
          parameters:
            aws_key:
              componentInputParameter: aws_key
            aws_secret:
              componentInputParameter: aws_secret
            metrics_json:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: ds-evaluation
            model_name:
              componentInputParameter: model_name
            roc_auc_threshold:
              componentInputParameter: roc_auc_threshold
            s3_endpoint:
              componentInputParameter: s3_endpoint
            tracking_uri:
              componentInputParameter: tracking_uri
            train_result_json:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: ds-model-training
        taskInfo:
          name: ds-model-registration
      ds-model-training:
        cachingOptions: {}
        componentRef:
          name: comp-ds-model-training
        dependentTasks:
        - ds-feature-engineering
        inputs:
          artifacts:
            dataset:
              taskOutputArtifact:
                outputArtifactKey: output_path
                producerTask: ds-feature-engineering
          parameters:
            aws_key:
              componentInputParameter: aws_key
            aws_secret:
              componentInputParameter: aws_secret
            experiment_name:
              componentInputParameter: experiment_name
            s3_endpoint:
              componentInputParameter: s3_endpoint
            tracking_uri:
              componentInputParameter: tracking_uri
        taskInfo:
          name: ds-model-training
      platform-feast-apply:
        cachingOptions: {}
        componentRef:
          name: comp-platform-feast-apply
        dependentTasks:
        - platform-spark-etl
        inputs:
          parameters:
            feast_repo_path:
              componentInputParameter: feast_repo_path
            pg_host:
              componentInputParameter: pg_host
            redis_host:
              componentInputParameter: redis_host
        taskInfo:
          name: platform-feast-apply
      platform-feast-materialize:
        cachingOptions: {}
        componentRef:
          name: comp-platform-feast-materialize
        dependentTasks:
        - platform-feast-apply
        inputs:
          parameters:
            apply_done:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: platform-feast-apply
            feast_repo_path:
              componentInputParameter: feast_repo_path
            pg_host:
              componentInputParameter: pg_host
            redis_host:
              componentInputParameter: redis_host
        taskInfo:
          name: platform-feast-materialize
      platform-spark-etl:
        cachingOptions: {}
        componentRef:
          name: comp-platform-spark-etl
        inputs:
          parameters:
            aws_access_key:
              componentInputParameter: aws_key
            aws_secret_key:
              componentInputParameter: aws_secret
            minio_endpoint:
              runtimeValue:
                constant: mlflow-minio:9000
            openlineage_url:
              runtimeValue:
                constant: http://marquez
            pg_database:
              runtimeValue:
                constant: warehouse
            pg_host:
              componentInputParameter: pg_host
            pg_password:
              runtimeValue:
                constant: feast
            pg_user:
              runtimeValue:
                constant: feast
            warehouse_table:
              componentInputParameter: table_name
        taskInfo:
          name: platform-spark-etl
  inputDefinitions:
    parameters:
      aws_key:
        defaultValue: minioadmin
        isOptional: true
        parameterType: STRING
      aws_secret:
        defaultValue: minioadmin123
        isOptional: true
        parameterType: STRING
      experiment_name:
        defaultValue: customer_churn_lineage
        isOptional: true
        parameterType: STRING
      feast_repo_path:
        defaultValue: /app/src/feature_store
        isOptional: true
        parameterType: STRING
      model_name:
        defaultValue: customer_churn_model
        isOptional: true
        parameterType: STRING
      pg_host:
        defaultValue: postgres
        isOptional: true
        parameterType: STRING
      pg_url:
        defaultValue: postgresql://feast:feast@postgres:5432/warehouse
        isOptional: true
        parameterType: STRING
      redis_host:
        defaultValue: redis
        isOptional: true
        parameterType: STRING
      roc_auc_threshold:
        defaultValue: 0.7
        isOptional: true
        parameterType: NUMBER_DOUBLE
      s3_endpoint:
        defaultValue: http://mlflow-minio:9000
        isOptional: true
        parameterType: STRING
      table_name:
        defaultValue: customer_features
        isOptional: true
        parameterType: STRING
      tracking_uri:
        defaultValue: openlineage+http://mlflow-server:5000
        isOptional: true
        parameterType: STRING
schemaVersion: 2.1.0
